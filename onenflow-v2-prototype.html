                <div style="font-size: 11px; color: var(--ink-500);" class="mono">${u.username}</div>
              </td>
              <td><span class="badge brand">${u.role}</span></td>
              <td>${u.unit}</td>
              <td style="font-size: 11px; color: var(--ink-500);">${session.user.id === u.id ? 'now (you)' : '2 hours ago'}</td>
              <td><button class="btn ghost sm">Edit</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <div style="margin-top: 10px;"><button class="btn brand sm">+ Add user</button></div>
    </div>

    <div class="card" style="background: var(--info-bg); border-color: var(--info);">
      <strong style="color: var(--info); font-size: 13px;">⚡ Backend RBAC contract</strong>
      <p style="margin: 4px 0 0; font-size: 12.5px; line-height: 1.55;">
        Spring Security with method-level <span class="mono">@PreAuthorize</span> annotations on every service method.
        Sign-off requires both <span class="mono">sign_off</span> permission AND four-eyes check (sign-off user ≠ creator user).
        Admin actions require fresh MFA within last 15 minutes (MFA step-up). All permission checks are logged
        to <span class="mono">access_log</span> table for audit.
      </p>
    </div>
  `;
}

function renderForbidden(pageName) {
  return `
    <div class="card" style="text-align: center; padding: 60px 20px;">
      <div style="font-size: 48px; margin-bottom: 12px;">🔒</div>
      <h3 style="font-family: Fraunces, serif; color: var(--navy-900); margin: 0 0 8px;">Admin access required</h3>
      <p style="color: var(--ink-500); font-size: 13px;">
        ${pageName} is restricted to <strong>${ROLES.ADMIN.label}</strong>.<br>
        Your current role: <strong>${ROLES[session.user.role].label}</strong>.
      </p>
      <div style="margin-top: 16px; display: flex; gap: 8px; justify-content: center;">
        <button class="btn ghost sm" onclick="navigate('queue')">← Back to queue</button>
        <button class="btn brand sm" onclick="openRoleSwitcher()">Switch role</button>
      </div>
    </div>
  `;
}
// =======================================================================
// PAGE: ANALYTICS
// =======================================================================
function renderAnalytics() {
  setCrumbs('Platform · <strong>Analytics</strong>');
  const filtered = CASES.filter(c => c.bank === CURRENT_BANK);
  const completed = filtered.filter(c => c.status === 'COMPLETED');
  const totalValue = completed.reduce((s, c) => s + (c.marketFisik || 0), 0);
  const avgTat = completed.length ? completed.reduce((s, c) => s + (c.tatDays || 0), 0) / completed.length : 0;
  const bmpkCount = filtered.filter(c => c.bmpkFlag).length;

  // KJPP performance
  const kjppPerf = KJPP_PANEL.filter(k => !k.isInternal && k.completedYTD > 0)
    .sort((a, b) => a.avgTatDays - b.avgTatDays);
  const maxTat = Math.max(...kjppPerf.map(k => k.avgTatDays));

  // Asset class distribution
  const byClass = {};
  filtered.forEach(c => { byClass[c.assetClass] = (byClass[c.assetClass] || 0) + 1; });
  const classEntries = Object.entries(byClass).sort((a, b) => b[1] - a[1]);

  return `
    <h1 class="page-title">Analytics</h1>
    <p class="page-sub">
      Bank-level metrics for ${BANKS[CURRENT_BANK].shortName}. Production version supports drill-down by branch, product, asset class, and date.
    </p>

    <div class="kpi-strip">
      <div class="kpi"><div class="kpi-label">Total cases YTD</div><div class="kpi-value">${filtered.length}</div><div class="kpi-sub">${completed.length} completed</div></div>
      <div class="kpi"><div class="kpi-label">Avg TAT</div><div class="kpi-value" style="color: var(--ok);">${avgTat.toFixed(1)}d</div><div class="kpi-sub">target ≤ 7 d (POJK 17)</div></div>
      <div class="kpi"><div class="kpi-label">Total market value</div><div class="kpi-value">${fmtRp(totalValue, { short: true })}</div><div class="kpi-sub">FISIK · completed</div></div>
      <div class="kpi"><div class="kpi-label">BMPK-flagged</div><div class="kpi-value" style="color: var(--warn);">${bmpkCount}</div><div class="kpi-sub">large-exposure POJK 23/2022</div></div>
      <div class="kpi"><div class="kpi-label">Active KJPPs</div><div class="kpi-value">${KJPP_PANEL.filter(k => k.isActive && !k.isInternal).length}</div><div class="kpi-sub">on panel</div></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h3 class="card-title">KJPP performance · avg TAT (days)</h3>
        <p class="card-hint">Lower is better. Internal pool typically faster (no travel) but external KJPPs handle complex/large cases.</p>
        <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 14px;">
          ${KJPP_PANEL.filter(k => k.completedYTD > 0).sort((a,b) => a.avgTatDays - b.avgTatDays).map(k => {
            const pct = (k.avgTatDays / Math.max(maxTat, 8)) * 100;
            return `
              <div>
                <div style="display: flex; justify-content: space-between; font-size: 11.5px; margin-bottom: 3px;">
                  <span>${k.firmName}${k.isInternal ? ' <span class="badge brand">internal</span>' : ''}</span>
                  <strong>${k.avgTatDays.toFixed(1)} d · ${k.completedYTD} cases</strong>
                </div>
                <div style="background: var(--ink-100); height: 14px; border-radius: 2px; overflow: hidden;">
                  <div style="background: ${k.avgTatDays <= 5 ? 'var(--ok)' : k.avgTatDays <= 7 ? 'var(--brand)' : 'var(--warn)'}; height: 100%; width: ${pct}%;"></div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      <div class="card">
        <h3 class="card-title">Asset class distribution</h3>
        <p class="card-hint">By count of cases (all statuses). Drives which schemas need active maintenance.</p>
        <table class="data" style="margin-top: 12px;">
          <thead><tr><th>Asset class</th><th class="num">Count</th><th class="num">Share</th><th></th></tr></thead>
          <tbody>
            ${classEntries.map(([k, n]) => {
              const pct = (n / filtered.length) * 100;
              return `
                <tr>
                  <td><span class="badge brand">${k}</span></td>
                  <td class="num"><strong>${n}</strong></td>
                  <td class="num">${pct.toFixed(0)}%</td>
                  <td style="width: 30%;">
                    <div style="background: var(--ink-100); height: 8px; border-radius: 2px; overflow: hidden;">
                      <div style="background: var(--brand); height: 100%; width: ${pct}%;"></div>
                    </div>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h3 class="card-title">SLA performance (last 30 days · completed)</h3>
      <p class="card-hint">POJK 17/2020 expects max 7 working days. Each case's TAT is days from intake to sign-off.</p>
      <table class="data">
        <thead><tr><th>Apr. No.</th><th>Asset</th><th>Branch</th><th>Source</th><th class="num">TAT</th><th>SLA</th></tr></thead>
        <tbody>
          ${completed.slice(0, 10).map(c => {
            const breach = c.tatDays > 7;
            return `
              <tr>
                <td><span class="mono" style="color: var(--brand-dark); font-weight: 600;">${c.aprNo}</span></td>
                <td>${c.assetType}</td>
                <td>${c.branch}</td>
                <td>${c.source === 'LINKED_LOS' ? '<span class="badge info">LOS</span>' : '<span class="badge ink">Standalone</span>'}</td>
                <td class="num"><strong style="color: ${breach ? 'var(--err)' : 'var(--ok)'};">${c.tatDays.toFixed(1)}d</strong></td>
                <td>${breach ? '<span class="badge err">Breach</span>' : '<span class="badge ok">On time</span>'}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>

    <div class="card">
      <h3 class="card-title">Compliance dashboard</h3>
      <table class="data">
        <thead><tr><th>Metric</th><th class="num">Count</th><th>Reference</th></tr></thead>
        <tbody>
          <tr><td>BMPK-flagged cases</td><td class="num">${filtered.filter(c => c.bmpkFlag).length}</td><td>POJK 23/2022 large-exposure check</td></tr>
          <tr><td>Revaluation due (next 30 d)</td><td class="num">${filtered.filter(c => c.nextRevaluationAt && new Date(c.nextRevaluationAt) < new Date(Date.now() + 30*86400000)).length}</td><td>POJK 40/2019 cycle tracker</td></tr>
          <tr><td>Revaluation overdue</td><td class="num" style="color: var(--err);">${filtered.filter(c => c.nextRevaluationAt && new Date(c.nextRevaluationAt) < new Date()).length}</td><td>POJK 40/2019 — regulatory finding risk</td></tr>
          <tr><td>External KJPP usage</td><td class="num">${filtered.filter(c => c.appraiserId === 'kjpp').length}</td><td>Independence check (≥30% required)</td></tr>
          <tr><td>4-eye signed-off cases</td><td class="num">${completed.length}</td><td>SPI 2018 · all completions had reviewer ≠ appraiser</td></tr>
        </tbody>
      </table>
    </div>
  `;
}

// =======================================================================
// PAGE: AUDIT LOG
// =======================================================================
function renderAudit() {
  setCrumbs('Platform · <strong>Audit Log</strong>');
  // Synthesise some events from CASES + activity
  const events = [];
  CASES.filter(c => c.bank === CURRENT_BANK).forEach(c => {
    events.push({ when: c.createdAt, who: USERS.find(u => u.id === c.createdBy)?.displayName || '—', action: 'CREATE_APPRAISAL', target: c.aprNo, ip: '10.42.18.7' });
    if (c.appraiserId) events.push({ when: c.createdAt, who: 'system', action: 'ASSIGN_APPRAISER', target: c.aprNo, detail: c.appraiserId, ip: '127.0.0.1' });
    if (c.status === 'COMPLETED' && c.reportNo) {
      events.push({ when: c.submittedAt + 'T16:00:00Z', who: USERS.find(u => u.id === c.approverId)?.displayName || '—', action: 'SIGN_OFF', target: c.aprNo, detail: c.reportNo, ip: '10.42.18.99' });
      events.push({ when: c.submittedAt + 'T16:00:30Z', who: 'system', action: 'WEBHOOK_T24', target: c.aprNo, detail: 'POST /api/webhook/t24 · 200', ip: '127.0.0.1' });
    }
  });
  events.push({ when: new Date().toISOString(), who: session.user.displayName, action: 'LOGIN', target: 'session', detail: `role=${session.user.role}`, ip: '203.0.113.42' });
  events.sort((a, b) => new Date(b.when) - new Date(a.when));

  return `
    <h1 class="page-title">Audit log</h1>
    <p class="page-sub">
      Append-only log of every state-changing action. Banks can export to SIEM via Kafka.
      MFA step-up events, sign-offs, schema edits, RBAC changes — all captured immutably.
    </p>

    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: baseline;">
        <div>
          <h3 class="card-title">Recent events</h3>
          <p class="card-hint">${events.length} events · last 30 days · ${BANKS[CURRENT_BANK].shortName}</p>
        </div>
        <div style="display: flex; gap: 8px;">
          <input type="text" placeholder="Filter by action, user, target…" style="padding: 6px 10px; font-size: 12px; border: 1px solid var(--ink-200); border-radius: 4px; width: 240px;">
          <button class="btn ghost sm">⤓ Export CSV</button>
        </div>
      </div>
      <table class="data">
        <thead>
          <tr><th>Timestamp</th><th>User</th><th>Action</th><th>Target</th><th>Detail</th><th>IP</th></tr>
        </thead>
        <tbody>
          ${events.slice(0, 30).map(e => `
            <tr>
              <td><span class="mono" style="font-size: 11px; color: var(--ink-500);">${e.when.slice(0, 19).replace('T', ' ')}</span></td>
              <td>${e.who}</td>
              <td><span class="badge ${actionColor(e.action)}">${e.action}</span></td>
              <td><span class="mono" style="font-size: 11px;">${e.target}</span></td>
              <td style="font-size: 11.5px; color: var(--ink-700);">${e.detail || '—'}</td>
              <td><span class="mono" style="font-size: 10.5px; color: var(--ink-500);">${e.ip}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    <div class="card" style="background: var(--info-bg); border-color: var(--info);">
      <strong style="color: var(--info); font-size: 13px;">⚡ Audit retention</strong>
      <p style="margin: 4px 0 0; font-size: 12.5px; line-height: 1.55;">
        Per BI/OJK guidance: minimum 10 years for transactional events, 5 years for access logs.
        Each event is signed with HMAC-SHA256 using a tenant-scoped key, making tampering detectable.
        Critical actions (sign-off, schema edits, RBAC changes, license suspension) require fresh MFA within 15 minutes.
      </p>
    </div>
  `;
}
function actionColor(a) {
  if (a.includes('SIGN_OFF') || a.includes('CREATE')) return 'ok';
  if (a.includes('WEBHOOK')) return 'info';
  if (a.includes('LOGIN')) return 'brand';
  if (a.includes('REJECT') || a.includes('REWORK')) return 'err';
  return 'ink';
}

// =======================================================================
// MASTER RENDER
// =======================================================================
function render() {
  if (!session.loggedIn) return;
  renderSidebar();
  renderTopbar();
  const c = document.getElementById('content');
  switch (route) {
    case 'queue':         c.innerHTML = renderQueue(); break;
    case 'detail':        c.innerHTML = renderDetail(); break;
    case 'intake':        c.innerHTML = renderIntake(); break;
    case 'revaluation':   c.innerHTML = renderRevaluation(); break;
    case 'kjpp':          c.innerHTML = renderKjppPanel(); break;
    case 'analytics':     c.innerHTML = renderAnalytics(); break;
    case 'audit':         c.innerHTML = renderAudit(); break;
    case 'admin-banks':   c.innerHTML = renderAdminBanks(); break;
    case 'admin-schema':  c.innerHTML = renderAdminSchema(); break;
    case 'admin-rbac':    c.innerHTML = renderAdminRbac(); break;
    default:              c.innerHTML = renderQueue();
  }
}

// =======================================================================
// INITIAL PAINT — LOGIN SCREEN
// =======================================================================
renderLogin();
</script>

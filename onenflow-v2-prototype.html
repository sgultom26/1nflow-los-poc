<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>1nFlow Appraisal v2 — Modular LPJ Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fraunces:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-900: #0b1e4b;
    --navy-800: #14275a;
    --navy-50:  #fff8ed;
    --accent-500: #ffa93a;
    --accent-600: #d97706;
    --accent-50:  #fff8ed;
    --accent-100: #ffe4c5;
    --ink-900:  #0f172a;
    --ink-700:  #334155;
    --ink-500:  #64748b;
    --ink-400:  #94a3b8;
    --ink-300:  #cbd5e1;
    --ink-200:  #e2e8f0;
    --ink-100:  #f1f5f9;
    --ink-50:   #f8fafc;
    --surface:  #ffffff;
    --ok:       #059669;
    --ok-bg:    #d1fae5;
    --ok-50:    #e7f7eb;
    --warn:     #b45309;
    --warn-bg:  #ffe4c5;
    --err:      #dc2626;
    --err-bg:   #fee2e2;
    --info:     #2563eb;
    --info-bg:  #dbeafe;

    --brand: var(--accent-500);
    --brand-dark: var(--accent-600);
    --brand-light: var(--accent-50);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--ink-50);
    color: var(--ink-900);
    font-size: 13.5px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .fraunces { font-family: 'Fraunces', Georgia, serif; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  button { font-family: inherit; cursor: pointer; }
  a { color: inherit; }

  /* ============ LOGIN SCREEN ============ */
  .login-screen {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, var(--navy-900), var(--navy-800));
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .login-card {
    background: white;
    border-radius: 14px;
    width: 460px;
    max-width: 92vw;
    padding: 36px 38px 32px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.25);
  }
  .login-brand {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 22px;
  }
  .login-brand .mk {
    width: 38px; height: 38px;
    background: var(--accent-500);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    color: var(--navy-900); font-weight: 800; font-size: 17px;
  }
  .login-brand .nm { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; color: var(--navy-900); }
  .login-brand .sub { font-size: 11px; color: var(--ink-500); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

  .login-card h2 {
    font-family: 'Fraunces', serif;
    font-size: 20px; font-weight: 600;
    color: var(--navy-900);
    margin: 0 0 4px 0;
  }
  .login-card .desc {
    font-size: 12.5px; color: var(--ink-500); margin: 0 0 18px 0;
  }
  .login-pickers {
    display: flex; flex-direction: column; gap: 6px;
    margin-bottom: 14px;
  }
  .login-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border: 1px solid var(--ink-200);
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
  }
  .login-row:hover { border-color: var(--brand); background: var(--brand-light); }
  .login-row.active { border-color: var(--brand); background: var(--brand-light); }
  .login-row .av {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--ink-200);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: var(--navy-900); font-size: 12px;
  }
  .login-row .nm { font-weight: 600; color: var(--navy-900); font-size: 13px; }
  .login-row .rl { font-size: 11px; color: var(--ink-500); margin-top: 1px; }

  /* ============ APP SHELL ============ */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
  }
  .sidebar {
    background: var(--navy-900);
    color: #fff;
    padding: 18px 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .brand-row {
    padding: 0 20px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; gap: 10px;
  }
  .brand-mark {
    width: 28px; height: 28px;
    background: var(--accent-500);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--navy-900); font-weight: 800; font-size: 14px;
  }
  .brand-text { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
  .brand-sub { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

  .nav-section { padding: 14px 12px 4px; font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; text-transform: uppercase; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px;
    color: rgba(255,255,255,0.78);
    font-size: 12.5px;
    cursor: pointer;
    border-left: 3px solid transparent;
    user-select: none;
    position: relative;
  }
  .nav-item:hover { background: rgba(255,255,255,0.04); color: white; }
  .nav-item.active {
    background: rgba(255,169,58,0.12);
    color: white;
    border-left-color: var(--accent-500);
  }
  .nav-item .ico { width: 14px; text-align: center; opacity: 0.8; }
  .nav-item .badge-num {
    margin-left: auto;
    background: var(--accent-500); color: var(--navy-900);
    font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 999px;
  }
  .nav-item.locked {
    color: rgba(255,255,255,0.3); cursor: not-allowed;
  }
  .nav-item.locked:hover { background: transparent; color: rgba(255,255,255,0.3); }

  .main { background: var(--ink-50); }
  .topbar {
    background: white;
    border-bottom: 1px solid var(--ink-200);
    padding: 10px 24px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 10;
  }
  .crumbs { font-size: 12px; color: var(--ink-500); }
  .crumbs strong { color: var(--ink-900); font-weight: 600; }
  .crumbs a { cursor: pointer; }
  .crumbs a:hover { color: var(--brand-dark); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .pill {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 10px 4px 4px;
    border: 1px solid var(--ink-200);
    border-radius: 999px;
    font-size: 11.5px;
    cursor: pointer;
    background: white;
  }
  .pill:hover { border-color: var(--brand); }
  .pill .dot { width: 18px; height: 18px; border-radius: 50%; }
  .pill .av {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--ink-200);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: var(--navy-900); font-size: 10.5px;
  }

  .content { padding: 22px 28px 60px; max-width: 1400px; }
  .page-title {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--navy-900);
    margin: 0 0 4px 0;
    letter-spacing: -0.02em;
  }
  .page-sub { color: var(--ink-500); font-size: 13px; margin: 0 0 18px 0; }

  /* ============ COMMON ELEMENTS ============ */
  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .badge.ok { background: var(--ok-bg); color: var(--ok); }
  .badge.warn { background: var(--warn-bg); color: var(--warn); }
  .badge.err { background: var(--err-bg); color: var(--err); }
  .badge.info { background: var(--info-bg); color: var(--info); }
  .badge.brand { background: var(--brand-light); color: var(--brand-dark); }
  .badge.ink { background: var(--ink-100); color: var(--ink-700); }

  .btn {
    border: 1px solid transparent;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.12s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--ink-200);
    color: var(--ink-700);
  }
  .btn.sm { padding: 5px 10px; font-size: 11.5px; }
  .btn.lg { padding: 9px 18px; font-size: 13px; }
  .btn.brand { background: var(--brand); color: white; }
  .btn.brand:hover { background: var(--brand-dark); }
  .btn.brand:disabled { background: var(--ink-300); cursor: not-allowed; }
  .btn.ghost { background: white; color: var(--ink-700); border-color: var(--ink-200); }
  .btn.ghost:hover { background: var(--ink-50); border-color: var(--ink-300); }
  .btn.danger { background: white; color: var(--err); border-color: var(--err-bg); }
  .btn.danger:hover { background: var(--err-bg); }
  .btn[disabled] { opacity: 0.5; cursor: not-allowed; }
  .btn .lock { font-size: 11px; opacity: 0.6; }

  /* ============ KPI ============ */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 22px;
  }
  .kpi {
    background: white;
    border: 1px solid var(--ink-200);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .kpi-label { font-size: 11px; color: var(--ink-500); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .kpi-value { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 700; color: var(--navy-900); margin-top: 4px; line-height: 1; }
  .kpi-sub { font-size: 11px; color: var(--ink-500); margin-top: 4px; }

  /* ============ TABS ============ */
  .tab-strip {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--ink-200);
    margin-bottom: 18px;
    overflow-x: auto;
    align-items: stretch;
  }
  .tab {
    background: transparent; border: 0;
    padding: 10px 14px;
    font-size: 12.5px; font-weight: 500;
    color: var(--ink-500);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    cursor: pointer;
  }
  .tab:hover { color: var(--ink-900); }
  .tab.active {
    color: var(--navy-900);
    font-weight: 700;
    border-bottom-color: var(--brand);
  }

  /* ============ CARDS ============ */
  .card {
    background: white;
    border: 1px solid var(--ink-200);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 11px;
    color: var(--brand-dark);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 0 0 4px 0;
  }
  .card-hint { font-size: 11.5px; color: var(--ink-500); margin: 0 0 14px 0; }

  /* ============ FORM ============ */
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px 14px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 14px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px 14px; }
  .field label {
    display: block;
    font-size: 11px; font-weight: 600;
    color: var(--ink-700);
    margin-bottom: 3px;
    letter-spacing: 0.02em;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 6px 9px;
    font-size: 12.5px;
    border: 1px solid var(--ink-200);
    border-radius: 4px;
    font-family: inherit;
    color: var(--ink-900);
    background: white;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: 2px solid var(--brand-light);
    border-color: var(--brand);
  }
  .field input:disabled, .field select:disabled, .field textarea:disabled {
    background: var(--ink-50); cursor: not-allowed;
  }
  .field-hint { font-size: 10.5px; color: var(--ink-500); margin-top: 2px; }

  /* ============ TABLES ============ */
  table.data {
    width: 100%; border-collapse: collapse; font-size: 12.5px;
  }
  table.data thead th {
    text-align: left;
    background: var(--ink-50);
    color: var(--ink-700);
    font-size: 10.5px; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase;
    padding: 8px 10px;
    border-bottom: 1px solid var(--ink-200);
  }
  table.data tbody td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--ink-100);
    vertical-align: top;
  }
  table.data tbody tr:hover td { background: var(--ink-50); }
  table.data tr.click { cursor: pointer; }
  table.data .num { text-align: right; font-variant-numeric: tabular-nums; }

  /* ============ BPMN ============ */
  .bpmn-wrap {
    border: 1px solid var(--ink-200);
    border-radius: 10px;
    background: white;
    padding: 12px 14px 16px;
    margin-bottom: 16px;
    overflow-x: auto;
  }
  .bpmn-svg { width: 100%; min-width: 1080px; display: block; }
  .bpmn-svg .node rect, .bpmn-svg .node circle, .bpmn-svg .node polygon { cursor: pointer; transition: filter 0.12s; }
  .bpmn-svg .node:hover rect, .bpmn-svg .node:hover circle, .bpmn-svg .node:hover polygon {
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15));
  }
  .bpmn-svg .node text { pointer-events: none; font-size: 9.5px; fill: var(--ink-700); font-weight: 600; }
  .bpmn-svg .node-default rect, .bpmn-svg .node-default circle {
    fill: white; stroke: var(--ink-300); stroke-width: 1.4;
  }
  .bpmn-svg .node-default text { fill: var(--ink-500); }
  .bpmn-svg .node-completed rect, .bpmn-svg .node-completed circle {
    fill: var(--ok-50); stroke: var(--ok); stroke-width: 1.6;
  }
  .bpmn-svg .node-completed text { fill: var(--ok); }
  .bpmn-svg .node-current rect, .bpmn-svg .node-current circle {
    fill: var(--brand-light); stroke: var(--brand); stroke-width: 2;
  }
  .bpmn-svg .node-current text { fill: var(--brand-dark); font-weight: 700; }
  .bpmn-svg .node-rejected rect {
    fill: var(--err-bg); stroke: var(--err); stroke-width: 1.6;
  }
  .bpmn-svg .arrow { fill: none; stroke: var(--ink-400); stroke-width: 1.4; }
  .bpmn-svg .arrow-completed { stroke: var(--ok); }
  .bpmn-svg .gateway polygon { fill: white; stroke: var(--ink-400); stroke-width: 1.4; }
  .bpmn-svg .gateway-completed polygon { fill: var(--ok-50); stroke: var(--ok); }
  .bpmn-svg .gateway-current polygon { fill: var(--brand-light); stroke: var(--brand); stroke-width: 2; }
  .bpmn-svg .glyph { font-size: 8.5px; font-weight: 700; fill: var(--ink-500); pointer-events: none; }
  .bpmn-svg .pulse {
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .bpmn-tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--ink-900); color: white;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 11.5px;
    max-width: 280px;
    z-index: 50;
    box-shadow: 0 8px 16px -4px rgba(0,0,0,0.3);
    line-height: 1.45;
  }
  .bpmn-tooltip .tt-title { font-weight: 700; font-size: 12.5px; margin-bottom: 3px; }
  .bpmn-tooltip .tt-meta { color: #cbd5e1; font-size: 11px; }
  .bpmn-tooltip .tt-state { font-size: 10.5px; margin-top: 4px; }

  .bpmn-legend {
    display: flex; gap: 14px; flex-wrap: wrap;
    font-size: 11px; color: var(--ink-500);
    margin-top: 8px; padding-top: 10px;
    border-top: 1px dashed var(--ink-200);
  }
  .bpmn-legend .leg { display: flex; align-items: center; gap: 4px; }
  .bpmn-legend .swatch { width: 12px; height: 12px; border-radius: 3px; border: 1px solid; }

  /* ============ DRAWER (BPMN node detail) ============ */
  .drawer-bg {
    position: fixed; inset: 0;
    background: rgba(11,30,75,0.4);
    z-index: 80;
    display: none;
  }
  .drawer-bg.open { display: block; }
  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 460px; max-width: 95vw;
    background: white;
    z-index: 90;
    box-shadow: -10px 0 30px rgba(0,0,0,0.15);
    display: none; flex-direction: column;
    overflow-y: auto;
  }
  .drawer.open { display: flex; }
  .drawer-head {
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--ink-200);
    background: linear-gradient(180deg, var(--brand-light), white);
  }
  .drawer-head .pre {
    font-size: 10.5px; color: var(--brand-dark);
    text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 700; margin-bottom: 4px;
  }
  .drawer-head h3 {
    margin: 0;
    font-family: 'Fraunces', serif;
    font-size: 19px; font-weight: 600;
    color: var(--navy-900);
  }
  .drawer-head .sub { font-size: 12px; color: var(--ink-500); margin-top: 4px; }
  .drawer-close {
    position: absolute; top: 14px; right: 14px;
    background: white; border: 1px solid var(--ink-200);
    width: 32px; height: 32px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px;
  }
  .drawer-close:hover { background: var(--ink-50); }
  .drawer-body { padding: 18px 24px 36px; }
  .drawer-section { margin-bottom: 22px; }
  .drawer-section h4 {
    font-size: 10.5px; color: var(--ink-500);
    text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 700; margin: 0 0 8px 0;
  }
  .segment-tile {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px;
    border-bottom: 1px dashed var(--ink-100);
    font-size: 12px;
  }
  .segment-dot { width: 8px; height: 8px; border-radius: 50%; }
  .segment-dot.filled { background: var(--ok); }
  .segment-dot.empty { background: var(--ink-300); }
  .segment-name { flex: 1; }
  .segment-meta { font-size: 10.5px; color: var(--ink-500); }

  /* ============ MODAL ============ */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(11,30,75,0.6);
    z-index: 100;
    display: none;
    align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white; border-radius: 12px;
    width: 540px; max-width: 92vw; max-height: 85vh;
    padding: 22px; overflow-y: auto;
    box-shadow: 0 30px 60px rgba(0,0,0,0.3);
  }
  .modal h3 {
    margin: 0 0 4px 0;
    font-family: 'Fraunces', serif; font-size: 18px;
    color: var(--navy-900);
  }
  .modal .desc {
    margin: 0 0 14px 0;
    font-size: 12.5px; color: var(--ink-500);
  }

  /* ============ SUMMARY STRIP ============ */
  .summary-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    background: var(--brand-light);
    border: 1px solid var(--brand);
    border-radius: 10px;
    padding: 14px 18px;
    margin: 14px 0 18px;
  }
  .summary-cell .lbl {
    font-size: 10.5px; color: var(--ink-500);
    text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700;
  }
  .summary-cell .val {
    font-family: 'Fraunces', serif; font-size: 19px; font-weight: 700;
    color: var(--navy-900); margin-top: 3px; line-height: 1.2;
  }

  /* ============ PDF PREVIEW ============ */
  .pdf-frame {
    background: white;
    border: 1px solid var(--ink-200);
    border-radius: 10px;
    padding: 28px 36px;
    color: #111;
    font-size: 9.5pt;
    line-height: 1.32;
    max-width: 760px;
    margin: 0 auto;
    box-shadow: 0 4px 24px rgba(0,0,0,0.04);
  }
  .pdf-brand { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; padding-bottom: 8px; margin-bottom: 10px; }
  .pdf-brand .pdf-bank { font-size: 14pt; font-weight: 700; color: var(--brand); }
  .pdf-brand .pdf-bank-sub { font-size: 7.5pt; color: #777; letter-spacing: 0.05em; text-transform: uppercase; }
  .pdf-brand .pdf-version { font-size: 7.5pt; color: #777; font-style: italic; }
  .pdf-title-bar { background: var(--brand); color: white; text-align: center; padding: 8px; font-weight: 700; font-size: 11pt; letter-spacing: 0.05em; margin-bottom: 8px; }
  .pdf-section-title { background: #f1f1f1; border: 1px solid #d3d3d3; padding: 4px 8px; font-weight: 700; font-size: 9pt; margin: 10px 0 4px; }
  table.pdf-kv, table.pdf-sum { width: 100%; border-collapse: collapse; font-size: 8.4pt; margin-bottom: 4px; }

  .check-box { display: inline-block; width: 11px; height: 11px; border: 1px solid #555; text-align: center; line-height: 11px; font-size: 8pt; font-weight: 700; vertical-align: middle; }
  .check-box.on { background: var(--brand); color: white; border-color: var(--brand); }
  .check-box.off { background: white; color: #999; }

  .sig-row { display: flex; justify-content: space-around; margin-top: 28px; }
  .sig { width: 30%; text-align: center; font-size: 8pt; }
  .sig .role { color: #777; font-size: 7pt; text-transform: uppercase; margin-bottom: 30px; }
  .sig .name { font-weight: 700; margin-top: 30px; }
  .sig .mappi { color: #555; font-size: 7.5pt; }

    display: flex; align-items: stretch;
    background: var(--ink-50);
    border-radius: 8px;
    padding: 4px;
    margin-bottom: 14px;
  }
  .approval-step {
    flex: 1;
    padding: 10px 12px;
    text-align: center;
    border-radius: 6px;
    font-size: 11.5px;
    position: relative;
  }
  .approval-step.passed { background: var(--ok-50); color: var(--ok); }
  .approval-step.current { background: var(--brand-light); color: var(--brand-dark); font-weight: 700; }
  .approval-step.pending { background: white; color: var(--ink-500); }
  .approval-step.rejected { background: var(--err-bg); color: var(--err); }
  .approval-step .role { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
  .approval-step .who { font-weight: 700; }
  .approval-step + .approval-step::before {
    content: ''; position: absolute; left: -8px; top: 50%;

    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    transform: translateY(-50%);

    position: sticky; bottom: 0;
    background: linear-gradient(to top, white 70%, transparent);

    margin-top: 12px;
    display: flex; gap: 8px; justify-content: flex-end;
    border-top: 1px solid transparent;
  }
  .save-bar.dirty { border-top-color: var(--brand); }

  /* ============ INTAKE WIZARD ============ */
  .intake-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    margin-bottom: 18px;
  }
  .intake-card {
    background: white;
    border: 1.5px solid var(--ink-200);
    border-radius: 10px;
    padding: 22px 20px;
    cursor: pointer;
    transition: border-color 0.12s, transform 0.12s;

  .intake-card:hover { border-color: var(--brand); transform: translateY(-2px); }
  .intake-card.active { border-color: var(--brand); background: var(--brand-light); }
  .intake-card .ic {
    width: 40px; height: 40px;
    background: var(--brand-light); color: var(--brand-dark);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    margin-bottom: 12px;

  .intake-card h4 {
    margin: 0 0 4px;
    font-family: 'Fraunces', serif; font-size: 16px; color: var(--navy-900);
  }
  .intake-card .desc {
    font-size: 12px; color: var(--ink-500); margin: 0 0 8px;

  .intake-card .features {

  .schema-row.head {

  }
  .schema-row .drag {
    cursor: grab; color: var(--ink-300); text-align: center;
  }
  .schema-row input, .schema-row select {
    width: 100%; padding: 4px 6px;

  }
  .schema-row .icon-btn {

    font-size: 14px; cursor: pointer;
  }

  .toast-wrap {
    position: fixed; top: 70px; right: 24px;
    z-index: 200;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    background: white; border-left: 4px solid var(--brand);
    border-radius: 6px;
    padding: 10px 14px;

  @keyframes toast-in {

function daysBetween(a, b) {

function relDays(s) {
  if (!s) return '—';

  if (d === 0) return 'Today';

  if (d === -1) return 'Yesterday';

// =======================================================================
// STAGE STATE
// =======================================================================
// Map case status → BPMN node IDs that are "completed" / "current"
function bpmnStateForCase(c) {
  const reachedSet = new Set();
  let currentId = null;

  // start always done
  reachedSet.add('start');

  if (['INTAKE'].includes(c.status)) {
    currentId = 'intake';
  } else if (['TRIAGE'].includes(c.status)) {
    reachedSet.add('intake');
    currentId = 'triage';
  } else if (['ASSIGNED', 'SCHEDULED'].includes(c.status)) {
    ['intake', 'triage', 'routingGw', 'autoChecks'].forEach(x => reachedSet.add(x));
    currentId = 'assignAppraiser';
  } else if (['SITE_VISIT'].includes(c.status)) {
    ['intake', 'triage', 'routingGw', 'autoChecks', 'assignAppraiser'].forEach(x => reachedSet.add(x));
    currentId = 'siteVisit';
  } else if (['IN_PROGRESS', 'DRAFT'].includes(c.status)) {
    ['intake', 'triage', 'routingGw', 'autoChecks', 'assignAppraiser', 'siteVisit'].forEach(x => reachedSet.add(x));
    currentId = 'draftLPJ';
  } else if (['IN_REVIEW'].includes(c.status)) {
    ['intake', 'triage', 'routingGw', 'autoChecks', 'assignAppraiser', 'siteVisit', 'draftLPJ', 'submitReview'].forEach(x => reachedSet.add(x));
    currentId = 'fourEyeReview';
  } else if (['APPROVAL'].includes(c.status)) {
    ['intake', 'triage', 'routingGw', 'autoChecks', 'assignAppraiser', 'siteVisit', 'draftLPJ', 'submitReview', 'fourEyeReview', 'reviewGw'].forEach(x => reachedSet.add(x));
    currentId = 'finalApproval';
  } else if (['COMPLETED'].includes(c.status)) {
    APPRAISAL_BPMN.nodes.forEach(n => {
      if (n.id !== 'reworkLoop') reachedSet.add(n.id);
    });
    currentId = null;
  } else if (['REJECTED'].includes(c.status)) {
    currentId = 'fourEyeReview';
  }

  return { reachedSet, currentId };
}

// =======================================================================
// BPMN RENDERER
// =======================================================================
function renderBpmn(c, opts = {}) {
  const { reachedSet, currentId } = bpmnStateForCase(c);
  const NODES = APPRAISAL_BPMN.nodes;
  const ARROWS = APPRAISAL_BPMN.arrows;

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('viewBox', '0 0 980 380');
  svg.setAttribute('class', 'bpmn-svg');
  svg.setAttribute('role', 'img');
  svg.setAttribute('aria-label', 'BPMN process flow — hover for details, click for full info');

  // Defs for arrowheads
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  defs.innerHTML = `
    <marker id="arDef" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arOk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#059669"/>
    </marker>
  `;
  svg.appendChild(defs);

  // Draw arrows
  ARROWS.forEach(([a, b]) => {
    const src = NODES.find(n => n.id === a);
    const dst = NODES.find(n => n.id === b);
    if (!src || !dst) return;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');

    const completed = reachedSet.has(a) && reachedSet.has(b);
    const cls = completed ? 'arrow arrow-completed' : 'arrow';
    const marker = completed ? 'url(#arOk)' : 'url(#arDef)';

    let d;
    if (a === 'draftLPJ' && b === 'submitReview') {
      // Wrap from row1-end to row2-start
      const sx = src.x + 96, sy = src.y + 25;
      const dx = dst.x, dy = dst.y + 25;
      d = `M ${sx} ${sy} L ${sx + 30} ${sy} L ${sx + 30} 150 L ${dx - 30} 150 L ${dx - 30} ${dy} L ${dx} ${dy}`;
    } else if (a === 'reviewGw' && b === 'reworkLoop') {
      // Down to rework
      const sx = src.x + 30, sy = src.y + 60;
      const dx = dst.x + 48, dy = dst.y;
      d = `M ${sx} ${sy} L ${sx} ${dy - 10} L ${dx} ${dy - 10} L ${dx} ${dy}`;
    } else if (a === 'reworkLoop' && b === 'fourEyeReview') {
      // Loop back up & left
      const sx = src.x, sy = src.y + 25;
      const dx = dst.x + 96, dy = dst.y + 25;
      d = `M ${sx} ${sy} L ${sx - 30} ${sy} L ${sx - 30} ${dy + 50} L ${dx + 30} ${dy + 50} L ${dx + 30} ${dy} L ${dx} ${dy}`;
    } else if (b === 'finalApproval' && a === 'reviewGw') {
      // Approve = right
      const sx = src.x + 60, sy = src.y + 30;
      const dx = dst.x, dy = dst.y + 25;
      d = `M ${sx} ${sy} L ${dx} ${dy}`;
    } else {
      const sxOff = src.type === 'circle' ? 18 : (src.type === 'gateway' ? 60 : 96);
      const syOff = src.type === 'circle' ? 20 : (src.type === 'gateway' ? 30 : 25);
      const dxOff = 0;
      const dyOff = dst.type === 'circle' ? 20 : (dst.type === 'gateway' ? 30 : 25);
      d = `M ${src.x + sxOff} ${src.y + syOff} L ${dst.x + dxOff} ${dst.y + dyOff}`;
    }
    path.setAttribute('d', d);
    path.setAttribute('class', cls);
    path.setAttribute('marker-end', marker);
    svg.appendChild(path);
  });

  // Decision label "YES" / "NO" near reviewGw
  const yesLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  yesLabel.setAttribute('x', 408); yesLabel.setAttribute('y', 222);
  yesLabel.setAttribute('class', 'glyph');
  yesLabel.setAttribute('fill', '#059669');
  yesLabel.textContent = 'YES';
  svg.appendChild(yesLabel);

  const noLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  noLabel.setAttribute('x', 348); noLabel.setAttribute('y', 280);
  noLabel.setAttribute('class', 'glyph');
  noLabel.setAttribute('fill', '#b45309');
  noLabel.textContent = 'NO · rework';
  svg.appendChild(noLabel);

  // Draw nodes
  NODES.forEach(b => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    let cls;
    if (currentId === b.id) cls = 'node-current';
    else if (reachedSet.has(b.id)) cls = 'node-completed';
    else cls = 'node-default';
    if (c.status === 'REJECTED' && b.id === 'fourEyeReview') cls = 'node-rejected';

    g.setAttribute('class', 'node ' + cls);
    g.style.cursor = 'pointer';
    g.addEventListener('mouseenter', (e) => showBpmnTooltip(e, c, b));
    g.addEventListener('mousemove', moveBpmnTooltip);
    g.addEventListener('mouseleave', hideBpmnTooltip);
    g.addEventListener('click', () => openBpmnDrawer(c, b));

    if (b.type === 'circle') {
      const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circ.setAttribute('cx', b.x + 18); circ.setAttribute('cy', b.y + 20);
      circ.setAttribute('r', 18);
      g.appendChild(circ);
      if (b.id === 'end') {
        const inner = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        inner.setAttribute('cx', b.x + 18); inner.setAttribute('cy', b.y + 20);
        inner.setAttribute('r', 14); inner.setAttribute('fill', 'none');
        inner.setAttribute('stroke', cls === 'node-completed' ? 'var(--ok)' : 'var(--ink-400)');
        inner.setAttribute('stroke-width', '1.5');
        g.appendChild(inner);
      }
      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', b.x + 18); t.setAttribute('y', b.y + 54);
      t.setAttribute('text-anchor', 'middle');
      t.textContent = b.label;
      g.appendChild(t);
    } else if (b.type === 'gateway') {
      g.setAttribute('class', 'node gateway ' +
        (currentId === b.id ? 'gateway-current' : reachedSet.has(b.id) ? 'gateway-completed' : ''));
      const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      const cx = b.x + 30, cy = b.y + 30, sz = 28;
      poly.setAttribute('points', `${cx},${cy - sz} ${cx + sz},${cy} ${cx},${cy + sz} ${cx - sz},${cy}`);
      g.appendChild(poly);
      const sym = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      sym.setAttribute('x', cx); sym.setAttribute('y', cy + 5);
      sym.setAttribute('text-anchor', 'middle');
      sym.setAttribute('font-size', '14'); sym.setAttribute('font-weight', '700');
      sym.setAttribute('fill', 'var(--ink-700)');
      sym.textContent = '×';
      g.appendChild(sym);
      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', cx); t.setAttribute('y', b.y + 78);
      t.setAttribute('text-anchor', 'middle');
      t.textContent = b.label;
      g.appendChild(t);
    } else {
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', b.x); rect.setAttribute('y', b.y);
      rect.setAttribute('width', 96); rect.setAttribute('height', 50);
      rect.setAttribute('rx', 6);
      g.appendChild(rect);
      // Pulse animation for current node
      if (currentId === b.id) {
        rect.setAttribute('class', 'pulse');
      }
      // Glyph for service / gateway
      if (b.type !== 'task') {
        const glyph = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        glyph.setAttribute('x', b.x + 8); glyph.setAttribute('y', b.y + 13);
        glyph.setAttribute('class', 'glyph');
        glyph.textContent = b.type === 'service' ? '⚙' : (b.type === 'rule' ? 'DMN' : '');
        g.appendChild(glyph);
      }
      const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      txt.setAttribute('x', b.x + 48); txt.setAttribute('y', b.y + 30);
      txt.setAttribute('text-anchor', 'middle');
      const parts = b.label.split(/\s+/);
      if (parts.length > 1 && b.label.length > 9) {
        const t1 = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
        t1.setAttribute('x', b.x + 48); t1.setAttribute('dy', '-3');
        t1.textContent = parts.slice(0, Math.ceil(parts.length / 2)).join(' ');
        const t2 = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
        t2.setAttribute('x', b.x + 48); t2.setAttribute('dy', '13');
        t2.textContent = parts.slice(Math.ceil(parts.length / 2)).join(' ');
        txt.appendChild(t1); txt.appendChild(t2);
      } else {
        txt.textContent = b.label;
      }
      g.appendChild(txt);
    }
    svg.appendChild(g);
  });

  const wrap = document.createElement('div');
  wrap.className = 'bpmn-wrap';
  const head = document.createElement('div');
  head.style.cssText = 'display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px;';
  head.innerHTML = `
    <div>
      <div style="font-size: 11px; color: var(--ink-500); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700;">BPMN process · appraisalProcess</div>
      <div style="font-size: 10.5px; color: var(--ink-500); margin-top: 2px;">Hover any node for tooltip · click for full details</div>
    </div>
    <div style="font-size: 11px; color: var(--ink-500);">
      ${currentId
        ? `Currently at: <strong style="color: var(--brand-dark);">${NODES.find(n => n.id === currentId)?.label ?? currentId}</strong>`
        : (c.status === 'COMPLETED' ? '<strong style="color: var(--ok);">✓ Completed</strong>' : '')}
    </div>
  `;
  wrap.appendChild(head);
  wrap.appendChild(svg);
  // Legend
  const leg = document.createElement('div');
  leg.className = 'bpmn-legend';
  leg.innerHTML = `
    <div class="leg"><span class="swatch" style="background: white; border-color: var(--ink-300);"></span> Pending</div>
    <div class="leg"><span class="swatch" style="background: var(--brand-light); border-color: var(--brand);"></span> Current (active)</div>
    <div class="leg"><span class="swatch" style="background: var(--ok-50); border-color: var(--ok);"></span> Completed</div>
    <div class="leg" style="margin-left: auto;">⚙ Service task · ◇ Gateway · ○ Event</div>
  `;
  wrap.appendChild(leg);
  return wrap;
}

// ---- TOOLTIP ----
function showBpmnTooltip(e, c, b) {
  hideBpmnTooltip();
  const { reachedSet, currentId } = bpmnStateForCase(c);
  const tip = document.createElement('div');
  tip.className = 'bpmn-tooltip';
  tip.id = 'bpmnTooltip';
  let stateLine;
  if (currentId === b.id) stateLine = '⚡ Currently active';
  else if (reachedSet.has(b.id)) stateLine = '✓ Completed';
  else stateLine = '○ Pending';
  const sub = [];
  if (b.role) sub.push(b.role);
  if (b.sla) sub.push('SLA ' + b.sla);
  tip.innerHTML = `
    <div class="tt-title">${b.label}</div>
    <div class="tt-meta">${b.type === 'task' ? 'User task' : b.type === 'service' ? 'Service task' : b.type === 'gateway' ? 'Gateway' : 'Event'}${sub.length ? ' · ' + sub.join(' · ') : ''}</div>
    <div class="tt-state">${stateLine}</div>
    <div class="tt-state" style="color: #94a3b8;">Click for details</div>
  `;
  document.body.appendChild(tip);
  moveBpmnTooltip(e);
}
function moveBpmnTooltip(e) {
  const tip = document.getElementById('bpmnTooltip');
  if (!tip) return;
  tip.style.left = Math.min(window.innerWidth - 300, e.clientX + 12) + 'px';
  tip.style.top = (e.clientY - tip.offsetHeight - 14) + 'px';
}
function hideBpmnTooltip() {
  const t = document.getElementById('bpmnTooltip');
  if (t) t.remove();
}

// ---- DRAWER ----
function openBpmnDrawer(c, b) {
  hideBpmnTooltip();
  const { reachedSet, currentId } = bpmnStateForCase(c);
  const stage = currentId === b.id ? 'current' : reachedSet.has(b.id) ? 'completed' : 'pending';
  const lpj = LPJ_DETAIL[c.aprNo];
  const activity = (lpj?.activity ?? []).filter(a => a.stage === b.stage || a.stage === b.id);

  const head = `
    <button class="drawer-close" onclick="closeDrawer()">×</button>
    <div class="drawer-head">
      <div class="pre">${b.type === 'task' ? 'User task' : b.type === 'service' ? 'Service task' : b.type === 'gateway' ? 'Exclusive gateway' : 'Event'}</div>
      <h3>${b.label}</h3>
      <div class="sub">${[b.role, b.sla ? 'SLA ' + b.sla : null].filter(x => x).join(' · ') || '—'}</div>
      <div style="margin-top: 12px;">
        ${stage === 'current' ? '<span class="badge brand">⚡ Active</span>' : ''}
        ${stage === 'completed' ? '<span class="badge ok">✓ Completed</span>' : ''}
        ${stage === 'pending' ? '<span class="badge ink">○ Pending</span>' : ''}
      </div>
    </div>
  `;
  let body = '<div class="drawer-body">';
  if (stage === 'current') {
    body += `
      <div class="drawer-section">
        <h4>Current state</h4>
        <div style="font-size: 12.5px; line-height: 1.6;">
          <div>Assigned to: <strong>${b.role || '—'}</strong></div>
          <div>Entered stage: <span style="color: var(--ink-500);">${fmtDate(c.submittedAt)}</span></div>
          <div>SLA target: <span style="color: var(--warn);">${b.sla || '—'}</span></div>
        </div>
      </div>
    `;
  }
  if (b.segments) {
    body += `<div class="drawer-section"><h4>Data segments</h4>`;
    b.segments.forEach((seg, i) => {
      const filled = stage === 'completed' || (stage === 'current' && i < Math.floor(b.segments.length * 0.5));
      body += `
        <div class="segment-tile">
          <span class="segment-dot ${filled ? 'filled' : 'empty'}"></span>
          <span class="segment-name">${seg}</span>
          <span class="segment-meta">${filled ? 'filled' : 'pending'}</span>
        </div>
      `;
    });
    body += `</div>`;
  }
  if (activity.length > 0) {
    body += `<div class="drawer-section"><h4>Recent activity · this stage</h4>`;
    activity.forEach(a => {
      body += `
        <div style="font-size: 12px; padding: 6px 0; border-bottom: 1px dashed var(--ink-100);">
          <span class="mono" style="color: var(--ink-400); font-size: 11px; margin-right: 8px;">${a.when}</span>
          ${a.what}
          ${a.who ? `<span style="color: var(--ink-500); font-size: 11px;"> — ${a.who}</span>` : ''}
        </div>
      `;
    });
    body += `</div>`;
  }
  // Actions for current stage based on RBAC
  if (stage === 'current') {
    const actions = bpmnStageActions(c, b);
    if (actions.length > 0) {
      body += `<div class="drawer-section"><h4>Actions</h4><div style="display: flex; flex-wrap: wrap; gap: 8px;">`;
      actions.forEach(a => {
        const dis = !hasPerm(a.perm) ? 'disabled title="Your role cannot perform this"' : `onclick="${a.onclick}"`;
        body += `<button class="btn ${a.kind}" ${dis}>${a.label}</button>`;
      });
      body += `</div></div>`;
    }
  }
  body += '</div>';
  document.getElementById('drawer').innerHTML = head + body;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerBg').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerBg').classList.remove('open');
}

function bpmnStageActions(c, b) {
  const actions = [];
  if (b.id === 'triage') {
    actions.push({ label: 'Assign internal', perm: 'assign', kind: 'brand sm', onclick: `simAction('${c.aprNo}', 'assign-internal')` });
    actions.push({ label: 'Assign to KJPP', perm: 'assign', kind: 'ghost sm', onclick: `simAction('${c.aprNo}', 'assign-kjpp')` });
  }
  if (b.id === 'siteVisit') {
    actions.push({ label: 'Open LPJ editor', perm: 'edit_section', kind: 'brand sm', onclick: `navigate('detail', '${c.aprNo}')` });
  }
  if (b.id === 'fourEyeReview') {
    actions.push({ label: 'Approve', perm: 'review', kind: 'brand sm', onclick: `simAction('${c.aprNo}', 'approve')` });
    actions.push({ label: 'Request rework', perm: 'request_rework', kind: 'ghost sm', onclick: `simAction('${c.aprNo}', 'rework')` });
  }
  if (b.id === 'finalApproval') {
    actions.push({ label: 'Sign off & generate report no.', perm: 'sign_off', kind: 'brand sm', onclick: `simAction('${c.aprNo}', 'signoff')` });
  }
  return actions;
}

function simAction(aprNo, action) {
  const c = CASES.find(x => x.aprNo === aprNo);
  if (action === 'approve') { c.status = 'APPROVAL'; toast('Approved · routed to final approval'); }
  if (action === 'rework')  { c.status = 'DRAFT'; toast('Rework requested', 'err'); }
  if (action === 'signoff') {
    const seq = String(Math.floor(Math.random() * 50) + 800).padStart(3, '0');
    const roman = MONTH_ROMAN[new Date().getMonth()];
    const year = new Date().getFullYear();
    c.reportNo = BANKS[CURRENT_BANK].reportNoScheme
      .replace('{seq}', seq).replace('{romanMonth}', roman)
      .replace('{area}', 'JKT').replace('{year}', year);
    c.status = 'COMPLETED';
    c.tatDays = 5.2;
    toast(`Signed off · report ${c.reportNo}`, 'ok');
  }
  if (action === 'assign-internal') { c.status = 'ASSIGNED'; c.appraiserId = 'agus'; toast('Assigned to Agus Setiawan (internal)'); }
  if (action === 'assign-kjpp')     { c.status = 'ASSIGNED'; c.appraiserId = 'kjpp'; toast('Assigned to KJPP Kusnanto & Rekan'); }
  closeDrawer();
  render();
}

function filterByRole(cases) {
  const u = session.user;
  if (u.role === 'ADMIN' || u.role === 'CREDIT_OFFICER' || u.role === 'APPROVAL_MANAGER' || u.role === 'APPRAISAL_REVIEWER') {
    return cases;
  }
  if (u.role === 'RM') {
    return cases.filter(c => c.rmId === u.id || c.createdBy === u.id);
  }
  if (u.role === 'APPRAISER_INTERNAL' || u.role === 'APPRAISER_KJPP') {
    return cases.filter(c => c.appraiserId === u.id);
  }
  return cases;
}

function kickoffReval(aprNo) {
  if (!hasPerm('create_appraisal')) {
    return toast('Your role cannot kick off revaluations', 'err');
  }
  const orig = CASES.find(c => c.aprNo === aprNo);
  const newAprNo = `APR-2025-${String(Math.floor(Math.random() * 100) + 900).padStart(6, '0')}`;
  CASES.unshift({
    ...orig,
    aprNo: newAprNo, reportNo: null,
    status: 'INTAKE', source: 'REVALUATION_POJK40',
    submittedAt: new Date().toISOString().slice(0, 10),
    slaAt: new Date(Date.now() + 7 * 86400000).toISOString().slice(0, 10),
    tatDays: null, marketFisik: null, liqFisik: null,
    workflow: { stage: 'intake', subStage: 'triage' },
  });
  toast(`Revaluation ${newAprNo} kicked off · pre-filled from ${aprNo}`, 'ok');
  navigate('detail', newAprNo);
}

function setTab(t) { activeTab = t; dirty = false; render(); }

// Detail page action buttons - role-gated
function detailActions(c) {
  const acts = [];
  if (c.status === 'INTAKE' || c.status === 'TRIAGE') {
    acts.push({ label: 'Assign internal',    perm: 'assign',         kind: 'brand sm', onclick: `simAction('${c.aprNo}', 'assign-internal')` });
    acts.push({ label: 'Assign to KJPP',     perm: 'assign',         kind: 'ghost sm', onclick: `simAction('${c.aprNo}', 'assign-kjpp')` });
  }
  if (c.status === 'IN_REVIEW') {
    acts.push({ label: '✓ Approve',          perm: 'review',         kind: 'brand sm', onclick: `simAction('${c.aprNo}', 'approve')` });
    acts.push({ label: 'Request rework',     perm: 'request_rework', kind: 'ghost sm', onclick: `simAction('${c.aprNo}', 'rework')` });
  }
  if (c.status === 'APPROVAL') {
    acts.push({ label: '⚡ Sign off',         perm: 'sign_off',       kind: 'brand sm', onclick: `simAction('${c.aprNo}', 'signoff')` });
  }
  if (c.status === 'COMPLETED') {
    acts.push({ label: '⤓ Download PDF',     perm: 'view_all',       kind: 'ghost sm', onclick: `setTab('preview')` });
  }
  return acts;
}

function renderTab(tab, summary, lpj) {
  switch (tab) {
    case 'overview':    return renderOverviewTab(summary, lpj);
    case 'assignment':  return renderAssignmentTab(summary, lpj);
    case 'legality':    return renderLegalityTab(summary, lpj);
    case 'land_env':    return renderLandEnvTab(summary, lpj);
    case 'building':    return renderBuildingTab(summary, lpj);
    case 'valuation':   return renderValuationTab(summary, lpj);
    case 'comparables': return renderComparablesTab(summary, lpj);
    case 'signoff':     return renderSignoffTab(summary, lpj);
    case 'preview':     return renderPreviewTab(summary, lpj);
    default:            return renderOverviewTab(summary, lpj);
  }
}

// =======================================================================
// TAB: OVERVIEW (BPMN + approval chain + activity)
// =======================================================================
function renderOverviewTab(summary, lpj) {
  // Build approval chain
  const chain = [
    { role: 'PENILAI',  who: appraiserName(summary), state: appraiserState(summary) },
    { role: 'REVIEWER', who: reviewerName(summary),  state: reviewerState(summary) },
    { role: 'APPROVER', who: approverName(summary),  state: approverState(summary) },
    { role: 'CORE BANK',who: 'T24 webhook',          state: t24State(summary) },
  ];

  const activity = lpj?.activity ?? [];

  // Defer BPMN injection so we can use createElementNS (string templates can't bind SVG events).
  // Master render() sets innerHTML synchronously, then this microtask fires and finds the host div.
  setTimeout(() => {
    const host = document.getElementById('bpmnHost');
    if (host) {
      host.innerHTML = '';
      host.appendChild(renderBpmn(summary));
    }
  }, 0);

  return `
    <div id="bpmnHost"></div>

    <div class="card">
      <h3 class="card-title">Approval chain</h3>
      <p class="card-hint">Each step is gated to a role. Click a step to see who is assigned and what they need to do.</p>
      <div class="approval-chain">
        ${chain.map(s => `
          <div class="approval-step ${s.state}">
            <div class="role">${s.role}</div>
            <div class="who">${s.who}</div>
            <div style="font-size: 10px; margin-top: 2px; opacity: 0.85;">${stateLabel(s.state)}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="grid-2" style="grid-template-columns: 1.4fr 1fr;">
      <div class="card">
        <h3 class="card-title">Activity timeline</h3>
        <p class="card-hint">All workflow events for this case (audit-grade).</p>
        ${activity.length > 0 ? `
          <div style="max-height: 360px; overflow-y: auto;">
            ${activity.slice().reverse().map(a => `
              <div style="display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px dashed var(--ink-100); font-size: 12px;">
                <span class="mono" style="color: var(--ink-400); font-size: 10.5px; flex-shrink: 0; width: 110px;">${a.when}</span>
                <div style="flex: 1;">
                  <div>${a.what}</div>
                  ${a.who ? `<div style="color: var(--ink-500); font-size: 10.5px;">— ${a.who}</div>` : ''}
                </div>
                <span class="badge ink" style="flex-shrink: 0; align-self: flex-start;">${a.stage}</span>
              </div>
            `).join('')}
          </div>
        ` : '<div style="font-style: italic; color: var(--ink-500); padding: 12px;">No activity yet — case just created.</div>'}
      </div>

      <div class="card">
        <h3 class="card-title">Case meta</h3>
        <table class="data" style="font-size: 12px;">
          <tbody>
            <tr><td style="color: var(--ink-500); width: 45%;">Source</td><td><strong>${summary.source}</strong></td></tr>
            ${summary.losAppNo ? `<tr><td style="color: var(--ink-500);">LOS app</td><td><span class="mono">${summary.losAppNo}</span></td></tr>` : ''}
            <tr><td style="color: var(--ink-500);">Branch</td><td>${summary.branch}</td></tr>
            <tr><td style="color: var(--ink-500);">Product</td><td>${summary.productLine}</td></tr>
            <tr><td style="color: var(--ink-500);">RM</td><td>${userById(summary.rmId)?.displayName ?? '—'}</td></tr>
            <tr><td style="color: var(--ink-500);">Appraiser</td><td>${userById(summary.appraiserId)?.displayName ?? '—'}</td></tr>
            <tr><td style="color: var(--ink-500);">Reviewer</td><td>${userById(summary.reviewerId)?.displayName ?? '—'}</td></tr>
            <tr><td style="color: var(--ink-500);">Approver</td><td>${userById(summary.approverId)?.displayName ?? '—'}</td></tr>
            <tr><td style="color: var(--ink-500);">Submitted</td><td>${fmtDate(summary.submittedAt)}</td></tr>
            <tr><td style="color: var(--ink-500);">SLA</td><td>${fmtDate(summary.slaAt)} (${relDays(summary.slaAt)})</td></tr>
            <tr><td style="color: var(--ink-500);">Priority</td><td><span class="badge ${summary.priority === 'HIGH' ? 'warn' : 'ink'}">${summary.priority}</span></td></tr>
            ${summary.tatDays ? `<tr><td style="color: var(--ink-500);">TAT</td><td><strong style="color: var(--ok);">${summary.tatDays.toFixed(1)} days</strong></td></tr>` : ''}
            <tr><td style="color: var(--ink-500);">Bank</td><td>${BANKS[summary.bank].shortName}</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card" style="background: var(--brand-light); border-color: var(--brand);">
      <strong style="color: var(--brand-dark); font-size: 13px;">⚡ How the BPMN drives this view</strong>
      <p style="margin: 4px 0 0; font-size: 12.5px; line-height: 1.55;">
        Click any node above to inspect its data segments and recent activity.
        The active stage (orange, pulsing) is what's blocking progress right now.
        Service tasks (⚙) are automated — Auto Checks, PDF Render, T24 Webhook all run without human input.
        The exclusive gateway (◇ Approve?) routes to <strong>finalApproval</strong> on YES, or back to <strong>Rework</strong> on NO.
      </p>
    </div>
  `;
}

function userById(id) { return USERS.find(u => u.id === id); }
function appraiserName(c) { return userById(c.appraiserId)?.displayName ?? '— unassigned —'; }
function reviewerName(c)  { return userById(c.reviewerId)?.displayName ?? '— pending —'; }
function approverName(c)  { return userById(c.approverId)?.displayName ?? '— pending —'; }

function appraiserState(c) {
  if (c.status === 'INTAKE' || c.status === 'TRIAGE') return 'pending';
  if (c.status === 'ASSIGNED' || c.status === 'SCHEDULED' || c.status === 'SITE_VISIT' || c.status === 'IN_PROGRESS' || c.status === 'DRAFT') return 'current';
  return 'passed';
}
function reviewerState(c) {
  if (c.status === 'IN_REVIEW') return 'current';
  if (c.status === 'REJECTED') return 'rejected';
  if (['APPROVAL','COMPLETED'].includes(c.status)) return 'passed';
  return 'pending';
}
function approverState(c) {
  if (c.status === 'APPROVAL') return 'current';
  if (c.status === 'COMPLETED') return 'passed';
  return 'pending';
}
function t24State(c) {
  if (c.status === 'COMPLETED') return 'passed';
  return 'pending';
}
function stateLabel(s) {
  return { passed: '✓ done', current: '⚡ active', pending: '○ waiting', rejected: '✗ rejected' }[s] || '';
}

  const previewReportNo = isCompleted ? summary.reportNo : reportNoPreview();

  return `

      <p class="card-hint">Each MAPPI-licensed appraiser must list their MAPPI no. The PENILAI row is required for sign-off.</p>

      ${sigs.map(s => `
        <div style="border: 1px solid var(--ink-200); border-radius: 8px; padding: 12px; margin-bottom: 8px; background: var(--ink-50);">
          <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px;">
            <strong style="font-size: 12px;">${s.role}</strong>
            ${isCompleted ? '<span style="color: var(--ok); font-size: 10.5px; font-weight: 600;">✓ signed 2025-08-11</span>' : ''}
          </div>
          <div class="grid-4">
            <div class="field"><label>Role</label>
              <select disabled><option>${s.role}</option></select>
            </div>
            <div class="field"><label>Full name *</label><input type="text" value="${s.fullName}" disabled></div>
            <div class="field"><label>MAPPI no.</label><input type="text" value="${s.mappiNo ?? ''}" disabled></div>
            <div class="field"><label>Title suffix</label><input type="text" value="${s.titleSuffix ?? ''}" disabled></div>
          </div>
        </div>
      `).join('')}
    </div>

    <div class="card">
      <h3 class="card-title">Final Sign-Off</h3>
      <p class="card-hint">Assigns the report number, sets status COMPLETED, and fires the T24 webhook. <strong>${ROLES.APPROVAL_MANAGER.label}</strong> or <strong>Admin</strong> only.</p>
      <div class="grid-2">
        <div class="field"><label>Report no. preview</label>
          <input type="text" value="${previewReportNo}" disabled>
          <div class="field-hint">Bank scheme: <span class="mono">${BANKS[CURRENT_BANK].reportNoScheme}</span></div>
        </div>
        <div class="field"><label>Confidence</label>
          <select disabled><option>HIGH</option><option>MEDIUM</option><option>LOW</option></select>
        </div>
      </div>

      <div class="pre-flight" style="margin-top: 14px; background: var(--ink-50); padding: 12px 14px; border-radius: 8px; font-size: 12px;">
        <strong style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-700);">Pre-flight checks</strong>
        <div style="display: flex; align-items: center; gap: 8px; padding: 3px 0;"><span style="color: var(--ok); font-weight: 700;">✓</span> Has at least one valuation line (${lpj?.valuationLines?.length ?? 0})</div>
        <div style="display: flex; align-items: center; gap: 8px; padding: 3px 0;"><span style="color: var(--ok); font-weight: 700;">✓</span> Has PENILAI signatory with MAPPI no.</div>
        <div style="display: flex; align-items: center; gap: 8px; padding: 3px 0;"><span style="color: var(--ok); font-weight: 700;">✓</span> Market value (FISIK) > 0</div>
        <div style="display: flex; align-items: center; gap: 8px; padding: 3px 0;"><span style="color: var(--ok); font-weight: 700;">✓</span> Section III legalitas rows have doc_no</div>
        <div style="margin-top: 8px; font-size: 11px; color: var(--ink-500);">
          <strong>Market (FISIK):</strong> ${fmtRp(sumD.marketValueFisik)} ·
          <strong>Liquidation:</strong> ${fmtRp(sumD.liquidationValueFisik)} ·
          <strong>Insurance min:</strong> ${fmtRp(sumD.insuranceMin)}
        </div>
      </div>

      <div style="margin-top: 16px; display: flex; justify-content: flex-end;">
        ${isCompleted
          ? `<span class="badge ok" style="padding: 6px 12px; font-size: 12px;">Already signed off</span>`
          : canSign
          ? `<button class="btn brand" onclick="simAction('${summary.aprNo}', 'signoff')">⚡ Sign off & generate report no.</button>`
          : `<button class="btn" disabled>⚡ Sign off <span class="lock">🔒</span></button>
             <span style="margin-left: 12px; align-self: center; font-size: 11.5px; color: var(--ink-500);">${ROLES.APPROVAL_MANAGER.label} role required</span>`
        }
      </div>
    </div>

    <div class="card" style="background: var(--info-bg); border-color: var(--info);">
      <strong style="color: var(--info); font-size: 13px;">⚡ Atomic sign-off contract</strong>
      <p style="margin: 4px 0 0; font-size: 12.5px; line-height: 1.55;">
        Sign-off is one transactional step that does five things:
        (1) generates the report number from the bank's MessageFormat scheme,
        (2) sets status to <span class="mono">COMPLETED</span>,
        (3) computes <span class="mono">next_revaluation_at</span> based on asset class cycle,
        (4) renders the LPJ PDF and signs it,
        (5) fires <span class="mono">POST /api/webhook/t24</span> to update collateral value in core banking.
        All-or-nothing: any failure rolls back the entire transaction.
      </p>
    </div>
  `;
}

function reportNoPreview() {
  const now = new Date();
  const seq = String(Math.floor(Math.random() * 50) + 800).padStart(3, '0');
  return BANKS[CURRENT_BANK].reportNoScheme
    .replace('{seq}', seq)
    .replace('{romanMonth}', MONTH_ROMAN[now.getMonth()])
    .replace('{area}', 'JKT')
    .replace('{year}', now.getFullYear());
}

let editingAssetClass = 'RUMAH_TINGGAL';
let editingSection = 'assignment';

function renderAdminSchema() {
  setCrumbs('Admin · <strong>Form Schema Editor</strong>');
  if (!hasPerm('*')) return renderForbidden('Form Schema Editor');

  const schema = FORM_SCHEMA[editingAssetClass];
  const sections = Object.keys(schema.sections);

  return `
    <h1 class="page-title">Form schema editor</h1>
    <p class="page-sub">
      Each asset class has its own field schema, separately for each LPJ section.
      Add, remove, reorder, or change field types — saved instantly. Default fields are pre-loaded; banks customise per their conventions.
    </p>

    <div class="grid-2" style="grid-template-columns: 280px 1fr;">
      <!-- LEFT: asset class picker -->
      <div class="card">
        <h3 class="card-title">Asset classes</h3>
        ${Object.entries(FORM_SCHEMA).map(([k, v]) => `
          <div onclick="pickAssetClass('${k}')" style="
            padding: 10px 12px; border-radius: 6px; cursor: pointer;
            margin-bottom: 4px;
            ${editingAssetClass === k ? 'background: var(--brand-light); border: 1px solid var(--brand);' : 'border: 1px solid var(--ink-200);'}">
            <div style="font-weight: 600; font-size: 12.5px; color: var(--navy-900);">${k}</div>
            <div style="font-size: 11px; color: var(--ink-500); margin-top: 2px;">${v.name}</div>
            <div style="font-size: 10.5px; color: var(--ink-500); margin-top: 4px;">
              ${Object.entries(v.sections).map(([sk, sv]) => `<span class="stat-pill" style="font-size: 10px; margin-right: 2px;">${sk}: ${sv.length}</span>`).join('')}
            </div>
          </div>
        `).join('')}
        <button class="btn ghost sm" style="width: 100%; margin-top: 8px;" onclick="addAssetClass()">+ New asset class</button>
      </div>

      <!-- RIGHT: section editor -->
      <div>
        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: baseline;">
            <div>
              <h3 class="card-title">${editingAssetClass} · ${schema.name}</h3>
              <p class="card-hint">Editing schema for this asset class. Section tabs below.</p>
            </div>
            <div style="font-size: 11px; color: var(--ink-500);">${sections.length} sections · ${Object.values(schema.sections).reduce((s,f) => s+f.length, 0)} fields total</div>
          </div>

          <div class="tab-strip" style="margin-bottom: 14px;">
            ${sections.map(s => `
              <button class="tab ${editingSection === s ? 'active' : ''}" onclick="pickSection('${s}')">${s}</button>
            `).join('')}
            <button class="tab" style="color: var(--ok);" onclick="addSection()">+ Add section</button>
          </div>

          <div class="schema-row head">
            <div></div>
            <div>Field key · label</div>
            <div>Type</div>
            <div>Required</div>
            <div>Default / Options</div>
            <div></div>
            <div></div>
          </div>

          <div id="schemaRows">
            ${(schema.sections[editingSection] || []).map((f, i) => renderSchemaFieldRow(f, i)).join('')}
          </div>

          <div style="display: flex; gap: 8px; margin-top: 14px;">
            <button class="btn brand sm" onclick="addField()">+ Add field</button>
            <button class="btn ghost sm" onclick="resetSchemaSection()">↩ Reset to defaults</button>
            <div style="flex: 1;"></div>
            <button class="btn ghost sm" onclick="exportSchema()">⤓ Export JSON</button>
          </div>
        </div>

        <div class="card" style="background: var(--brand-light); border-color: var(--brand);">
          <strong style="color: var(--brand-dark); font-size: 13px;">⚡ Live binding</strong>
          <p style="margin: 4px 0 0; font-size: 12.5px; line-height: 1.55;">
            Adding a field here instantly appears in the New Appraisal wizard, the LPJ section editor for this asset class,
            and gets persisted to <span class="mono">form_schema.field_def</span> in PostgreSQL. Existing cases keep their old schema (versioned),
            but new cases use the latest. Field type changes that would cause data loss require migration approval.
          </p>
        </div>

        <div class="card">
          <h3 class="card-title">Live preview · how this section renders to users</h3>
          <p class="card-hint">This is what an appraiser sees when editing this section.</p>
          <div style="background: var(--ink-50); border-radius: 8px; padding: 14px; border: 1px dashed var(--ink-300);">
            <div class="grid-3">
              ${(schema.sections[editingSection] || []).map(f => fieldPreview(f)).join('')}
            </div>
            ${(schema.sections[editingSection] || []).length === 0 ? '<em style="color: var(--ink-500);">No fields yet — add some above.</em>' : ''}
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderSchemaFieldRow(f, i) {
  const opts = f.options ? f.options.join(', ') : '';
  return `
    <div class="schema-row" data-idx="${i}">
      <div class="drag" title="Drag to reorder">⋮⋮</div>
      <div>
        <input type="text" value="${f.key}" placeholder="key" onchange="updateField(${i}, 'key', this.value)" style="font-family: 'JetBrains Mono', monospace; font-size: 11px; margin-bottom: 2px;">
        <input type="text" value="${f.label}" placeholder="Label shown to user" onchange="updateField(${i}, 'label', this.value)">
      </div>
      <div>
        <select onchange="updateField(${i}, 'type', this.value); render();">
          <option ${f.type === 'text' ? 'selected' : ''}>text</option>
          <option ${f.type === 'number' ? 'selected' : ''}>number</option>
          <option ${f.type === 'date' ? 'selected' : ''}>date</option>
          <option ${f.type === 'select' ? 'selected' : ''}>select</option>
          <option ${f.type === 'checkbox' ? 'selected' : ''}>checkbox</option>
          <option ${f.type === 'textarea' ? 'selected' : ''}>textarea</option>
        </select>
      </div>
      <div>
        <label style="display: flex; align-items: center; gap: 4px; font-size: 11px;">
          <input type="checkbox" ${f.required ? 'checked' : ''} onchange="updateField(${i}, 'required', this.checked)"> required
        </label>
      </div>
      <div>
        ${f.type === 'select'
          ? `<input type="text" value="${opts}" placeholder="A, B, C" onchange="updateField(${i}, 'options', this.value.split(',').map(x=>x.trim()))">`
          : `<input type="text" value="${f.default ?? ''}" placeholder="Default value" onchange="updateField(${i}, 'default', this.value)">`}
      </div>
      <div><button class="icon-btn" onclick="moveField(${i}, -1)" title="Move up">↑</button></div>
      <div><button class="icon-btn" onclick="moveField(${i}, 1)" title="Move down">↓</button> <button class="icon-btn" onclick="deleteField(${i})" title="Delete">🗑</button></div>
    </div>
  `;
}

function fieldPreview(f) {
  let input = '';
  if (f.type === 'text')     input = `<input type="text" placeholder="${f.default ?? ''}" disabled>`;
  else if (f.type === 'number')  input = `<input type="number" placeholder="${f.default ?? ''}" disabled>`;
  else if (f.type === 'date')    input = `<input type="date" disabled>`;
  else if (f.type === 'select')  input = `<select disabled>${(f.options ?? []).map(o => `<option>${o}</option>`).join('')}</select>`;
  else if (f.type === 'checkbox') input = `<label style="display:flex; align-items:center; gap:6px; padding-top:6px; font-size:12px;"><input type="checkbox" disabled> Yes</label>`;
  else if (f.type === 'textarea') input = `<textarea rows="2" disabled></textarea>`;
  else input = `<input type="text" disabled>`;
  return `
    <div class="field">
      <label>${f.label} ${f.required ? '<span style="color: var(--err);">*</span>' : ''}</label>
      ${input}
    </div>
  `;
}

function pickAssetClass(k) { editingAssetClass = k; editingSection = Object.keys(FORM_SCHEMA[k].sections)[0]; render(); }
function pickSection(s) { editingSection = s; render(); }

function addField() {
  const fields = FORM_SCHEMA[editingAssetClass].sections[editingSection];
  fields.push({ key: 'newField' + (fields.length + 1), label: 'New Field', type: 'text', required: false });
  render();
  toast('Added new field', 'ok');
}
function deleteField(i) {
  if (!confirm('Delete this field?')) return;
  FORM_SCHEMA[editingAssetClass].sections[editingSection].splice(i, 1);
  render();
  toast('Field deleted', 'ok');
}
function moveField(i, dir) {
  const fields = FORM_SCHEMA[editingAssetClass].sections[editingSection];
  const j = i + dir;
  if (j < 0 || j >= fields.length) return;
  [fields[i], fields[j]] = [fields[j], fields[i]];
  render();
}
function updateField(i, key, val) {
  FORM_SCHEMA[editingAssetClass].sections[editingSection][i][key] = val;
  // Don't re-render on every keystroke; only on type/checkbox changes which already call render.
}
function addSection() {
  const name = prompt('Section name (lowercase, no spaces):');
  if (!name) return;
  if (FORM_SCHEMA[editingAssetClass].sections[name]) return toast('Section exists', 'err');
  FORM_SCHEMA[editingAssetClass].sections[name] = [];
  editingSection = name;
  render();
  toast('Section added', 'ok');
}
function addAssetClass() {
  const name = prompt('Asset class code (UPPERCASE, e.g. KAPAL_LAUT):');
  if (!name) return;
  if (FORM_SCHEMA[name]) return toast('Asset class exists', 'err');
  FORM_SCHEMA[name] = {
    name: name.toLowerCase().replace(/_/g, ' '),
    sections: { assignment: [] },
  };
  editingAssetClass = name;
  editingSection = 'assignment';
  render();
  toast('Asset class added', 'ok');
}
function resetSchemaSection() {
  if (!confirm('Reset this section to defaults? (cannot undo in this demo)')) return;
  toast('Reset (demo: not actually reset)', 'ok');
}
function exportSchema() {
  const blob = JSON.stringify(FORM_SCHEMA, null, 2);
  console.log(blob);
  toast('Schema JSON logged to console', 'ok');
}

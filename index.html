  svg.setAttribute('class', 'bpmn-svg');
  svg.setAttribute('role', 'img');
  svg.setAttribute('aria-label', 'BPMN process flow — hover a node for details, click to open');

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  defs.innerHTML = '<marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/></marker>';
  svg.appendChild(defs);

  const arrows = [
    ['start','applicationEntry'],
    ['applicationEntry','pullExternalData'],
    ['pullExternalData','applicationEnrichment'],
    ['applicationEnrichment','camsSubcase'],
    ['camsSubcase','creditScoring'],
    ['creditScoring','aiCreditNarrator'],
    ['aiCreditNarrator','bmpkCheck'],
    ['bmpkCheck','creditException'],
    // wrap to row 2
    ['creditException','priceNegotiation'],
    ['priceNegotiation','underwriting'],
    ['underwriting','verification'],
    ['verification','legalVerification'],
    ['legalVerification','committeeApproval'],
    ['committeeApproval','customerAcceptance'],
    ['customerAcceptance','disbursement'],
    ['disbursement','end'],
  ];
  arrows.forEach(([a, b]) => {
    const src = boxes.find(x => x.id === a);
    const dst = boxes.find(x => x.id === b);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const sx = src.x + (src.type === 'circle' ? 18 : 96);
    const sy = src.y + (src.type === 'circle' ? 20 : 25);
    const dx = dst.x;
    const dy = dst.y + (dst.type === 'circle' ? 20 : 25);
    if (a === 'creditException') {
      // wrap down and back to left
      const path = `M ${sx} ${sy} L ${sx + 15} ${sy} L ${sx + 15} 150 L ${dx - 10} 150 L ${dx - 10} ${dy} L ${dx} ${dy}`;
      line.setAttribute('d', path);
    } else {
      line.setAttribute('d', `M ${sx} ${sy} L ${dx} ${dy}`);
    }
    line.setAttribute('class', 'arrow');
    line.setAttribute('marker-end', 'url(#ar)');
    svg.appendChild(line);
  });

  boxes.forEach(b => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    let cls = 'node-default';
    const stageIndex = STAGES.findIndex(s => s.id === b.id);
    if (b.id === 'start') cls = 'node-completed';
    else if (b.id === 'end' && app.status === 'DISBURSED') cls = 'node-completed';
    else if (stageIndex >= 0 && stageIndex < reached) cls = 'node-completed';
    else if (stageIndex === reached) cls = 'node-current';
    // Service/rule/case tasks highlight based on stage proximity
    if (b.id === 'pullExternalData'       && reached >= 1) cls = 'node-completed';
    if (b.id === 'camsSubcase'             && reached >= 2) cls = 'node-completed';
    if (b.id === 'creditScoring'           && reached >= 2) cls = 'node-completed';
    if (b.id === 'aiCreditNarrator'        && reached >= 2) cls = 'node-completed';
    if (b.id === 'bmpkCheck'               && reached >= 2) cls = 'node-completed';
    // Credit exception only highlighted if the app was routed there
    if (b.id === 'creditException' && app.status === 'IN_EXCEPTION') cls = 'node-current';
    else if (b.id === 'creditException' && reached > STAGES.findIndex(s => s.key === 'IN_EXCEPTION')) cls = 'node-completed';

    g.setAttribute('class', 'node ' + cls + (b.type === 'service' || b.type === 'rule' ? ' service' : ''));
    g.setAttribute('data-node-id', b.id);
    g.style.cursor = 'pointer';
    g.addEventListener('mouseenter', (e) => showBpmnTooltip(e, app, b));
    g.addEventListener('mousemove', moveBpmnTooltip);
    g.addEventListener('mouseleave', hideBpmnTooltip);
    g.addEventListener('click', () => openBpmnDrawer(app, b));

    if (b.type === 'circle') {
      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c.setAttribute('cx', b.x + 18); c.setAttribute('cy', b.y + 20); c.setAttribute('r', 18);
      g.appendChild(c);
      if (b.id === 'end') {
        const c2 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c2.setAttribute('cx', b.x + 18); c2.setAttribute('cy', b.y + 20); c2.setAttribute('r', 14);
        c2.setAttribute('fill', 'none');
        c2.setAttribute('stroke', cls === 'node-completed' ? 'var(--ok)' : 'var(--ink-400)');
        c2.setAttribute('stroke-width', '1.5');
        g.appendChild(c2);
      }
      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', b.x + 18); t.setAttribute('y', b.y + 54);
      t.setAttribute('text-anchor', 'middle');
      t.setAttribute('fill', 'var(--ink-500)');
      t.textContent = b.label;
      g.appendChild(t);
    } else {
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', b.x); rect.setAttribute('y', b.y);
      rect.setAttribute('width', 96); rect.setAttribute('height', 50);
      rect.setAttribute('rx', 6);
      g.appendChild(rect);
      if (b.type !== 'task') {
        const glyph = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        glyph.setAttribute('x', b.x + 8); glyph.setAttribute('y', b.y + 14);
        glyph.setAttribute('font-size', '8.5');
        glyph.setAttribute('font-weight', '700');
        glyph.setAttribute('fill', 'var(--ink-500)');
        glyph.textContent = b.type === 'service' ? '⚙' : (b.type === 'rule' ? 'DMN' : 'CMMN');
        g.appendChild(glyph);
      }
      const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      txt.setAttribute('x', b.x + 48); txt.setAttribute('y', b.y + 30);
      txt.setAttribute('text-anchor', 'middle');
      const parts = b.label.split(/\s+/);
      if (parts.length > 1 && b.label.length > 10) {
        const t1 = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
        t1.setAttribute('x', b.x + 48); t1.setAttribute('dy', '-3');
        t1.textContent = parts.slice(0, Math.ceil(parts.length / 2)).join(' ');
        const t2 = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
        t2.setAttribute('x', b.x + 48); t2.setAttribute('dy', '13');
        t2.textContent = parts.slice(Math.ceil(parts.length / 2)).join(' ');
        txt.appendChild(t1); txt.appendChild(t2);
      } else {
        txt.textContent = b.label;
      }
      g.appendChild(txt);
    }
    svg.appendChild(g);
  });

  const wrap = h('div', { style: 'overflow-x: auto;' });
  wrap.appendChild(svg);
  return wrap;
}

/* =========================================================
   BPMN TOOLTIP + DRAWER
========================================================= */
function bpmnNodeMeta(app, b) {
  const META = {
    start:                  { name: 'Loan application initiated',     type: 'Start event',          role: null },
    applicationEntry:       { name: 'Application Entry',              type: 'User task',            role: 'RM / Account Officer', sla: 'PT30M', segments: ['Customer Type & Identification','Lead/Prospect reference','Business Product','Loan Purpose','Application Channel','Agent info','Date & Priority'] },
    pullExternalData:       { name: 'Pull SLIK OJK + Dukcapil + AML', type: 'Service task',         role: 'System' },
    applicationEnrichment:  { name: 'Application Enrichment',         type: 'User task',            role: 'Credit Admin / RM',     sla: 'P1D',   segments: ['Financial Summary','Party Details','Existing Facilities','Existing Commitments','Proposed Collateral (triggers CAMS)','Pricing Proposal','Document Checklist'] },
    camsSubcase:            { name: 'CAMS — Collateral Assessment',   type: 'Case · CMMN',          role: 'CAMS Officer + KJPP + Legal' },
    creditScoring:          { name: 'Credit Scoring (DMN)',           type: 'Decision table · DMN', role: 'System' },
    aiCreditNarrator:       { name: 'AI Assist — 5C Narrative',       type: 'Service task',         role: 'Claude / GPT (advisory)' },
    bmpkCheck:              { name: 'BMPK Check (POJK 23/2022)',      type: 'Decision table · DMN', role: 'System' },
    creditException:        { name: 'Credit Exception Review',        type: 'User task',            role: 'Credit Head',           sla: 'P1D',   segments: ['Exception Summary (auto)','Justification (RM)','Override Approval + signature','Delegated Authority Check'] },
    priceNegotiation:       { name: 'Price Negotiation',              type: 'User task',            role: 'RM + Product Pricing',  sla: 'P1D',   segments: ['Interest Rate Proposal','Fees Schedule','Prepayment Terms','Covenant Pricing','Internal Approval'] },
    underwriting:           { name: 'Underwriting — 5C Deep Analysis', type: 'User task',           role: 'Credit Analyst',        sla: 'P2D',   segments: ['Character · SLIK deep scan','Capacity · cash flow','Capital · equity','Collateral · from CAMS','Condition · industry'] },
    verification:           { name: 'Application Verification',       type: 'User task',            role: 'Credit Admin',          sla: 'P1D',   segments: ['Completeness check','Document checklist','Four-eye signature'] },
    legalVerification:      { name: 'Legal Verification',             type: 'User task',            role: 'Legal',                 sla: 'P2D',   segments: ['Customer Legal Docs','Collateral Legal (from CAMS)','Akad Drafting','Legal Opinion PDF'] },
    committeeApproval:      { name: 'Committee Approval',             type: 'User task · multi-instance', role: 'Committee',       sla: 'P3D',   segments: ['Each member casts Approve/Reject','Majority OR single reject ends task','Four-eye: committee ≠ originator'] },
    customerAcceptance:     { name: 'Customer Acceptance & Akad',     type: 'User task',            role: 'RM',                    sla: 'P2D',   segments: ['SPPK generation','Customer signature','Akad Kredit notarial','SKMHT / APHT registration'] },
    disbursement:           { name: 'Disbursement to Core Banking',   type: 'Service task',         role: 'System' },
    end:                    { name: 'Loan disbursed',                 type: 'End event',            role: null },
  };
  const m = META[b.id] || { name: b.label, type: 'Task', role: null };
  const reached = STAGES.findIndex(s => s.key === app.status);
  const myStageIdx = STAGES.findIndex(s => s.id === b.id);
  let stageState = 'other';
  if (myStageIdx >= 0 && myStageIdx < reached) stageState = 'completed';
  else if (myStageIdx === reached) stageState = 'current';
  else if (myStageIdx > reached) stageState = 'pending';
  if (b.id === 'pullExternalData'  && reached >= 1) stageState = 'completed';
  if (b.id === 'camsSubcase'        && reached >= 2) stageState = 'completed';
  if (b.id === 'creditScoring'      && reached >= 2) stageState = 'completed';
  if (b.id === 'aiCreditNarrator'   && reached >= 2) stageState = 'completed';
  if (b.id === 'bmpkCheck'          && reached >= 2) stageState = 'completed';
  if (b.id === 'start') stageState = 'completed';
  if (b.id === 'end' && app.status === 'DISBURSED') stageState = 'completed';
  if (b.id === 'end' && app.status !== 'DISBURSED') stageState = 'pending';
  return { ...m, stageState };
}

function showBpmnTooltip(e, app, b) {
  hideBpmnTooltip();
  const meta = bpmnNodeMeta(app, b);
  const tip = h('div', { class: 'bpmn-tooltip', id: 'bpmn-tooltip' });
  tip.appendChild(h('div', { class: 'tt-title' }, meta.name));
  const sub = [];
  sub.push(meta.type);
  if (meta.role) sub.push(meta.role);
  if (meta.sla) sub.push('SLA ' + meta.sla);
  tip.appendChild(h('div', { class: 'tt-meta' }, sub.join(' · ')));
  tip.appendChild(h('div', { style: 'margin-top: 4px; font-size: 10px;' },
    meta.stageState === 'current' ? '⚡ Currently active' :
    meta.stageState === 'completed' ? '✓ Completed' :
    meta.stageState === 'pending' ? '○ Pending' :
    ''));
  tip.appendChild(h('div', { style: 'margin-top: 4px; font-size: 10px; color: #94a3b8;' }, 'Click for details'));
  document.body.appendChild(tip);
  moveBpmnTooltip(e);
}

function moveBpmnTooltip(e) {
  const tip = document.getElementById('bpmn-tooltip');
  if (!tip) return;
  const x = e.clientX;
  const y = e.clientY;
  tip.style.left = Math.min(window.innerWidth - 280, x + 12) + 'px';
  tip.style.top  = (y - tip.offsetHeight - 14) + 'px';
}

function hideBpmnTooltip() {
  const tip = document.getElementById('bpmn-tooltip');
  if (tip) tip.remove();
}

function openBpmnDrawer(app, b) {
  hideBpmnTooltip();
  const meta = bpmnNodeMeta(app, b);
  const drawer = document.getElementById('drawer');
  const backdrop = document.getElementById('drawer-backdrop');
  drawer.innerHTML = '';

  // Close button
  const closeBtn = h('button', { class: 'drawer-close', title: 'Close',
    onclick: closeBpmnDrawer });
  closeBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>';
  drawer.appendChild(closeBtn);

  // Head
  const head = h('div', { class: 'drawer-head' });
  head.appendChild(h('div', { class: 'pre' }, meta.type));
  head.appendChild(h('h3', {}, meta.name));
  const subBits = [];
  if (meta.role) subBits.push(meta.role);
  if (meta.sla) subBits.push('SLA ' + meta.sla);
  head.appendChild(h('div', { class: 'sub' }, subBits.join(' · ') || '—'));
  // SLA chip
  if (meta.stageState === 'current') {
    head.appendChild(h('div', { style: 'margin-top: 12px;' }, h('span', { class: 'sla-chip sla-warn' }, '⚡ Active · on-time')));
  } else if (meta.stageState === 'completed') {
    head.appendChild(h('div', { style: 'margin-top: 12px;' }, h('span', { class: 'sla-chip sla-ok' }, '✓ Completed')));
  } else if (meta.stageState === 'pending') {
    head.appendChild(h('div', { style: 'margin-top: 12px;' }, h('span', { class: 'sla-chip', style: 'background: var(--ink-100); color: var(--ink-700);' }, '○ Pending')));
  }
  drawer.appendChild(head);

  // Body
  const body = h('div', { class: 'drawer-body' });

  // Current state section
  if (meta.stageState === 'current') {
    const s1 = h('div', { class: 'drawer-section' });
    s1.appendChild(h('h4', {}, 'Current state'));
    s1.appendChild(h('div', { style: 'font-size: 13px; line-height: 1.55; color: var(--ink-900);' },
      h('div', {}, 'Assigned to: ', h('strong', {}, meta.role || 'unassigned')),
      h('div', {}, 'Entered stage: ', h('span', { style: 'color: var(--ink-500);' }, addMin(app.createdAt, 60))),
      h('div', {}, 'Time in stage: ', h('span', { style: 'color: var(--warn);' }, '18 jam 22 menit'))));
    body.appendChild(s1);
  }

  // Data segments — if this stage has them
  if (meta.segments && meta.segments.length > 0) {
    const s2 = h('div', { class: 'drawer-section' });
    s2.appendChild(h('h4', {}, 'Data segments'));
    meta.segments.forEach((seg, i) => {
      const filled = meta.stageState === 'completed' ? true : (i < Math.floor(meta.segments.length * 0.5));
      const tile = h('div', { class: 'segment-tile' });
      tile.appendChild(h('span', { class: 'segment-dot ' + (filled ? 'filled' : 'empty') }));
      tile.appendChild(h('span', { class: 'segment-name' }, seg));
      tile.appendChild(h('span', { class: 'segment-meta' }, filled ? 'filled' : 'empty'));
      s2.appendChild(tile);
    });
    body.appendChild(s2);
  }

  // Recent activity scoped to this stage
  const s3 = h('div', { class: 'drawer-section' });
  s3.appendChild(h('h4', {}, 'Recent activity · this stage'));
  const activity = buildStageActivity(app, b, meta);
  activity.forEach(a => {
    s3.appendChild(h('div', { style: 'font-size: 12px; color: var(--ink-700); padding: 6px 0; border-bottom: 1px dashed var(--ink-100);' },
      h('span', { style: 'font-family: ui-monospace, Menlo, monospace; color: var(--ink-400); font-size: 11px; margin-right: 8px;' }, a.when),
      a.what,
      a.who ? h('span', { style: 'color: var(--ink-500); font-size: 11px;' }, ' — ' + a.who) : null));
  });
  if (activity.length === 0) {
    s3.appendChild(h('div', { style: 'font-size: 12px; color: var(--ink-400); font-style: italic; padding: 6px 0;' }, 'No activity yet for this stage.'));
  }
  body.appendChild(s3);

  drawer.appendChild(body);

  // Actions footer — context-sensitive
  const foot = h('div', { class: 'drawer-foot' });
  if (meta.stageState === 'current') {
    foot.appendChild(h('button', { class: 'btn sm', onclick: () => { closeBpmnDrawer(); navigate('tasks'); } }, 'Take task →'));
    foot.appendChild(h('button', { class: 'btn ghost sm', onclick: () => {
      closeBpmnDrawer();
      // Scroll to memo panel
      setTimeout(() => {
        document.querySelector('.memo-compose textarea')?.focus();
      }, 50);
    }}, 'Post memo'));
    foot.appendChild(h('button', { class: 'btn ghost sm', onclick: () => { closeBpmnDrawer(); createReminderForStage(app, b); } }, 'Set reminder'));
  } else if (meta.stageState === 'completed') {
    foot.appendChild(h('button', { class: 'btn sm', onclick: () => { closeBpmnDrawer(); toast('Opening completed snapshot (read-only)', 'info'); } }, 'View snapshot'));
    foot.appendChild(h('button', { class: 'btn ghost sm', onclick: () => { closeBpmnDrawer(); } }, 'Close'));
  } else {
    foot.appendChild(h('button', { class: 'btn ghost sm', onclick: () => { closeBpmnDrawer(); } }, 'Close'));
  }
  drawer.appendChild(foot);

  drawer.classList.add('open');
  backdrop.classList.add('open');
  backdrop.onclick = closeBpmnDrawer;
}

function closeBpmnDrawer() {
  document.getElementById('drawer')?.classList.remove('open');
  document.getElementById('drawer-backdrop')?.classList.remove('open');
}

function buildStageActivity(app, b, meta) {
  const events = buildTimeline(app);
  const stageIdToEvents = {
    applicationEntry:      [0],
    pullExternalData:      [1, 2],
    applicationEnrichment: [3],
    camsSubcase:           [7],
    creditScoring:         [4],
    aiCreditNarrator:      [5],
    bmpkCheck:             [8],
    underwriting:          [6],
    verification:          [3],
    legalVerification:     [],
    committeeApproval:     [9],
    customerAcceptance:    [10],
    disbursement:          [11],
  };
  const idxs = stageIdToEvents[b.id] || [];
  return idxs.map(i => events[i]).filter(Boolean);
}

function createReminderForStage(app, b) {
  const meta = bpmnNodeMeta(app, b);
  const rem = {
    id: 'r-' + Date.now(),
    source: 'USER_CREATED',
    title: 'Check ' + meta.name + ' for ' + app.num,
    body: 'Manual reminder set from BPMN drawer',
    appNum: app.num,
    priority: 'NORMAL',
    at: new Date().toISOString().slice(0, 16).replace('T', ' '),
    read: false,
  };
  state.reminders = [rem, ...state.reminders];
  toast('Reminder set for "' + meta.name + '"', 'ok');
  render();
}

function renderAiAssist(app) {
  const card = h('div', { class: 'ai-card' });

  const head = h('div', { class: 'ai-head' });
  const titleBox = h('div');
  const title = h('h3', { class: 'ai-title' },
    aiSparkSvg(),
    'AI Assist — 5C Narrative',
    h('span', { class: 'ai-chip' }, h('span', { class: 'pulse' }), 'Advisory'));
  titleBox.appendChild(title);
  titleBox.appendChild(h('div', { class: 'ai-sub' }, 'Generated narrative for credit analyst review · does not affect decision'));
  head.appendChild(titleBox);
  card.appendChild(head);

  // Body — streamed in progressively to feel real
  const body = h('div', { class: 'ai-body' });
  const placeholder = h('p', { class: 'ai-loading' }, 'Generating narrative…');
  body.appendChild(placeholder);
  card.appendChild(body);

  // Flags
  const flagsBox = h('div', { style: 'margin-top: 12px;' });
  card.appendChild(flagsBox);

  // Meta footer
  const meta = h('div', { class: 'ai-meta' });
  card.appendChild(meta);

  // Disclaimer
  card.appendChild(h('div', { class: 'ai-disclaimer' },
    iconInfoSvg(),
    'Keputusan kredit final ditetapkan oleh DMN (Risk Grade ' + app.grade + ' · ' + app.auto + '). Narasi AI bersifat advisory dan tidak disimpan ke SLIK.'));

  // Generate the narrative from template — feels like streaming
  const narrative = generateNarrative(app);
  setTimeout(() => {
    body.innerHTML = '';
    narrative.paragraphs.forEach(p => {
      const el = h('p');
      el.innerHTML = p;
      body.appendChild(el);
    });
    narrative.flags.forEach(f => flagsBox.appendChild(h('span', { class: 'ai-flag' }, '⚑ ' + f)));
    meta.appendChild(h('span', {}, 'claude-sonnet-4-6'));
    meta.appendChild(h('span', {}, narrative.latency + 'ms'));
    meta.appendChild(h('span', {}, Math.round(narrative.paragraphs.join(' ').length / 4) + ' tokens'));
    meta.appendChild(h('span', {}, 'PII-scrubbed'));
  }, 600);

  return card;
}

function generateNarrative(app) {
  const p = PRODUCTS[app.product];
  const incomeBucket = app.income < 5e6 ? 'di bawah Rp 5jt' : app.income < 10e6 ? 'Rp 5-10jt' : app.income < 20e6 ? 'Rp 10-20jt' : app.income < 50e6 ? 'Rp 20-50jt' : 'di atas Rp 50jt';
  const dbrText = app.dbr < 30 ? 'sangat konservatif' : app.dbr < 40 ? 'dalam rentang wajar' : app.dbr < 50 ? 'mendekati batas' : 'tinggi dan perlu mitigasi';
  const slikText = app.slik === 1 ? 'lancar tanpa catatan' : app.slik === 2 ? 'dalam perhatian khusus' : app.slik === 3 ? 'kurang lancar' : 'diragukan';
  const paragraphs = [];
  const flags = [];

  // Character
  paragraphs.push(
    '<strong>Character.</strong> Berdasarkan SLIK/BI Checking, profil pemohon menunjukkan riwayat pembayaran yang ' + slikText +
    '. Tidak terdapat indikasi keterlambatan material dalam 12 bulan terakhir pada fasilitas kredit eksisting. Data due diligence Dukcapil terkonfirmasi valid.'
  );

  // Capacity
  paragraphs.push(
    '<strong>Capacity.</strong> Income bulanan berada pada bucket ' + incomeBucket +
    ' dengan DBR ' + app.dbr + '% — ' + dbrText + '. ' +
    (app.dbr >= 40 ? 'Analis disarankan memverifikasi ulang kewajiban cicilan eksisting agar perhitungan DBR tidak understate. ' : '') +
    'Cicilan yang diminta proporsional terhadap kapasitas pembayaran bulanan.'
  );

  // Capital & Collateral (product-specific)
  if (app.product === 'KPR') {
    paragraphs.push(
      '<strong>Capital & Collateral.</strong> Pemohon mengajukan KPR dengan tenor ' + app.tenor + ' bulan. Rasio LTV wajib divalidasi melalui KJPP sesuai kebijakan internal. ' +
      'Agunan berupa sertifikat (SHM/SHGB) memerlukan legal check di BPN sebelum akad. ' +
      'Proses SKMHT/APHT akan dijalankan di CMMN case ' + p.cmmn + '.'
    );
    flags.push('Wajib KJPP — konfirmasi ke Appraisal Coordinator');
    flags.push('Legal check BPN belum dikonfirmasi');
  } else if (app.product === 'KKB') {
    paragraphs.push(
      '<strong>Capital & Collateral.</strong> Permohonan KKB dengan BPKB sebagai agunan. ' +
      'Untuk kendaraan bekas, validasi nilai pasar melalui referensi sumber kedua (Seva/OLX) direkomendasikan. ' +
      'Cicilan all-risk insurance harus dibundel ke total pembayaran bulanan.'
    );
    flags.push('Verifikasi BPKB & dealer invoice');
  } else {
    paragraphs.push(
      '<strong>Capital & Collateral.</strong> Modal usaha sesuai deklarasi pemohon perlu diverifikasi silang dengan mutasi rekening 6 bulan terakhir. ' +
      'Untuk UMKM produktif, cash flow bisnis lebih prediktif dibanding pendapatan bulanan tetap. Agunan disesuaikan dengan kebijakan BPR (BPKB/deposito/tanah).'
    );
    if (app.amount >= 100e6) flags.push('Site visit wajib untuk plafon ≥ Rp 100jt');
  }

  // Conditions
  paragraphs.push(
    '<strong>Conditions.</strong> Tujuan kredit ("' + app.purpose + '") sejalan dengan produk ' + p.label + '. ' +
    'Kondisi makro-ekonomi dan sektoral tidak menunjukkan red flag spesifik pada saat analisis. ' +
    (app.auto === 'AUTO_APPROVE'
      ? 'Berdasarkan DMN, permohonan memenuhi kriteria auto-approve — analis tetap disarankan melakukan sanity check akhir.'
      : 'DMN merekomendasikan manual review karena profil berada pada zona B/C yang memerlukan human judgment.')
  );

  return {
    paragraphs,
    flags,
    latency: 800 + Math.floor(Math.random() * 600),
  };
}

  return svg;
}

function renderMemos(app) {

  const head = h('div', { class: 'memo-head' });
  const title = h('h3', { class: 'memo-title' },
    chatSvg(),
    'Internal Chat & Memos',
    h('span', { class: 'memo-count-chip' }, String(memos.length)));
  head.appendChild(title);
  head.appendChild(h('div', { style: 'font-size: 11px; color: var(--ink-500);' }, 'Visible only to bank staff · never to applicant'));

  const list = h('div', { class: 'memo-list' });

    list.appendChild(h('div', { style: 'text-align: center; color: var(--ink-400); padding: 28px; font-size: 13px;' },

  } else {
    // Pinned first, then chronological
    const sorted = [...memos].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || a.at.localeCompare(b.at));
    sorted.forEach(m => list.appendChild(renderMemoItem(m)));

  card.appendChild(list);

  // Compose
  const compose = h('div', { class: 'memo-compose' });
  const ta = h('textarea', { placeholder: 'Tulis memo… gunakan @user:username atau @role:role-nama untuk mention.' });

  [['ALL_PARTIES', 'All parties'], ['INTERNAL_ONLY', 'Internal only'], ['LEGAL_ONLY', 'Legal only'], ['COMMITTEE_ONLY', 'Committee only']].forEach(([v, l]) => {
    visSel.appendChild(h('option', { value: v }, l));
  });
  side.appendChild(visSel);
  const btn = h('button', { class: 'btn sm', onclick: () => {
    const text = ta.value.trim();
    if (!text) return;
    const newMemo = {
      id: 'm-' + Date.now(),
      author: 'Rina F.', role: 'Credit Analyst',
      at: new Date().toISOString().slice(0, 16).replace('T', ' '),
      body: text,
      mentions: extractMentions(text),
      visibility: visSel.value,
      pinned: false,
    };
    state.memos[app.num] = [...(state.memos[app.num] || []), newMemo];
    // Create reminders for user mentions
    newMemo.mentions.forEach(m => {
      if (m.startsWith('user:')) {
        state.reminders = [{
          id: 'r-' + Date.now(),
          source: 'MENTION',
          title: 'Rina F. mentioned you in a memo',
          body: text.length > 80 ? text.substring(0, 80) + '…' : text,
          appNum: app.num,
          priority: 'NORMAL',
          at: newMemo.at,
          read: false,
        }, ...state.reminders];
      }
    });
    ta.value = '';
    toast('Memo posted' + (newMemo.mentions.length ? ' · ' + newMemo.mentions.length + ' reminder(s) sent' : ''), 'ok');
    render();
  }}, 'Post memo');
  side.appendChild(btn);
  side.appendChild(h('div', { class: 'memo-hint' }, 'Shift+Enter for newline'));
  compose.appendChild(side);
  card.appendChild(compose);

  return card;
}

function renderMemoItem(m) {
  const item = h('div', { class: 'memo' + (m.pinned ? ' pinned' : '') });
  const initials = (m.author.split(/\s+/).map(w => w[0]).join('').substring(0, 2)).toUpperCase();
  const avClass = m.role === 'System' ? 'memo-avatar system' : 'memo-avatar';
  const avatar = h('div', { class: avClass }, m.role === 'System' ? '⚙' : initials);
  item.appendChild(avatar);
  const body = h('div', { class: 'memo-body' });
  const meta = h('div', { class: 'memo-meta' });
  meta.appendChild(h('span', { class: 'memo-author' }, m.author));
  meta.appendChild(h('span', { class: 'memo-role-chip' }, m.role));
  meta.appendChild(h('span', {}, m.at));
  if (m.visibility && m.visibility !== 'ALL_PARTIES') {
    meta.appendChild(h('span', { class: 'memo-vis-chip internal' }, m.visibility.replace(/_/g, ' ').toLowerCase()));
  }
  if (m.pinned) meta.appendChild(h('span', { class: 'memo-pin-chip' }, '📌 pinned'));
  body.appendChild(meta);

  // Body with highlighted mentions
  const text = h('div', { class: 'memo-text' });
  text.innerHTML = m.body.replace(/@(user|role):([a-zA-Z0-9._-]+)/g, '<span class="mention">@$1:$2</span>');
  body.appendChild(text);
  item.appendChild(body);
  return item;
}

function extractMentions(text) {
  const out = [];
  const re = /@(user|role):([a-zA-Z0-9._-]+)/g;
  let m;
  while ((m = re.exec(text))) out.push(m[1] + ':' + m[2]);
  return out;
}

function buildTimeline(app) {
  const reached = STAGES.findIndex(s => s.key === app.status);
  const events = [
    { what: 'Application submitted by AO',    who: 'Rina F.',            when: app.createdAt },
    { what: 'SLIK OJK pulled · Grade ' + app.slik, who: 'System',         when: addMin(app.createdAt, 2) },
    { what: 'Dukcapil NIK validated',          who: 'System',             when: addMin(app.createdAt, 2) },
    { what: 'Verification passed',             who: 'Admin K.',           when: addMin(app.createdAt, 90) },
    { what: 'DMN scored → Grade ' + app.grade + ' (' + app.auto + ')', who: 'System', when: addMin(app.createdAt, 91) },
    { what: 'AI narrative generated (advisory)', who: 'claude-sonnet-4-6', when: addMin(app.createdAt, 92) },
    { what: 'Underwriting — 5C analysis complete', who: 'Rina F.',        when: addMin(app.createdAt, 600) },
    { what: 'Appraisal case opened (CMMN: ' + PRODUCTS[app.product].cmmn + ')', who: 'System', when: addMin(app.createdAt, 601) },
    { what: 'BMPK check passed (POJK 23/2022)', who: 'System',            when: addMin(app.createdAt, 1080) },
    { what: 'Committee approval — 2 of 3 signatures', who: 'Komite Kredit', when: addMin(app.createdAt, 1440) },
    { what: 'Akad kredit signed',              who: 'RM · Notaris',       when: addMin(app.createdAt, 1820) },
    { what: 'Disbursement to core banking',    who: 'System',             when: addMin(app.createdAt, 1825) },
  ];
  // Map event index -> latest reached stage
  events.forEach((e, i) => {
    let threshold = i < 3 ? 0 : i < 5 ? 2 : i < 6 ? 2 : i < 7 ? 3 : i < 8 ? 3 : i < 9 ? 4 : i < 10 ? 5 : 6;
    if (reached > threshold) e.state = 'done';
    else if (reached === threshold) e.state = 'current';
    else e.state = 'pending';
  });
  if (app.status === 'REJECTED') {
    const rejectAt = Math.max(0, reached);
    return events.slice(0, rejectAt + 2).concat([{ what: 'Application rejected', who: 'System', when: addMin(app.createdAt, 150), state: 'done' }]);
  }
  return events;
}
function addMin(ts, m) {
  try {
    const d = new Date(ts.replace(' ', 'T'));
    d.setMinutes(d.getMinutes() + m);
    return d.toISOString().slice(0, 16).replace('T', ' ');
  } catch { return ts; }
}

  return root;

function renderAppraisalDetail(appraisalId) {
  const a = APPRAISAL_QUEUE.find(x => x.id === appraisalId);
  if (!a) {
    return h('div', {}, h('p', {}, 'Appraisal not found.'));
  }

  const root = h('div');

  // Breadcrumb
  const crumb = h('div', { style: 'font-size: 12px; color: var(--ink-500); margin-bottom: 8px;' },
    h('a', { href: '#', onclick: (e) => { e.preventDefault(); navigate('appraisal'); }, style: 'color: var(--navy-700); text-decoration: none;' }, '← Appraisal queue'),
    ' · ',
    h('span', {}, a.id));
  root.appendChild(crumb);

  // Title row
  const title = h('div', { style: 'display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px;' });
  title.appendChild(h('div', {},
    h('h1', { class: 'page-title', style: 'margin-bottom: 4px;' }, a.asset.type + ' · ' + a.applicant),
    h('p', { class: 'page-sub', style: 'margin-bottom: 0;' },
      h('span', { style: 'font-family: monospace;' }, a.id),
      ' · linked to ',
      h('strong', {}, a.appNo === '— (Revaluasi)' ? 'Revaluasi periodik' : a.appNo))));
  const statusBadge = {
    'IN_REVIEW': { cls: 'IN_COMMITTEE', label: 'In Review · Senior Appraiser' },
    'SCHEDULED': { cls: 'PENDING', label: 'Site Visit Scheduled' },
    'ASSIGNED': { cls: 'IN_PROGRESS', label: 'Assigned · Awaiting Visit' },
    'COMPLETED': { cls: 'APPROVED', label: '✓ Completed · Report Signed' },
    'REVALUATION': { cls: 'AVAILABLE', label: 'Revaluation Pending' },
  }[a.status];
  title.appendChild(h('span', { class: 'badge ' + statusBadge.cls, style: 'font-size: 12px; padding: 6px 12px; flex-shrink: 0;' }, statusBadge.label));
  root.appendChild(title);

  // Stage flow
  const stages = ['Request', 'Assigned', 'Site Visit', 'Valuation', 'Review', 'Signed'];
  const stageMap = { 'ASSIGNED': 1, 'SCHEDULED': 2, 'IN_REVIEW': 4, 'COMPLETED': 5, 'REVALUATION': 2 };
  const currentIdx = stageMap[a.status] || 0;
  const stageRow = h('div', { style: 'display: flex; gap: 0; margin: 16px 0 22px; align-items: stretch;' });
  stages.forEach((s, i) => {
    const cls = i < currentIdx ? 'done' : i === currentIdx ? 'current' : 'future';
    const colors = {
      'done': { bg: '#10b981', fg: '#fff' },
      'current': { bg: '#d4a017', fg: '#0b1e4b' },
      'future': { bg: '#f1f5f9', fg: '#94a3b8' }
    };
    const c = colors[cls];
    const pill = h('div', { style: `flex:1; background:${c.bg}; color:${c.fg}; padding:8px 4px; text-align:center; font-size:11px; font-weight:600; position:relative;` },
      h('div', { style: 'font-size: 9px; opacity: 0.7; margin-bottom: 2px; letter-spacing: 0.06em;' }, (i + 1) + '.'),
      s);
    if (i < stages.length - 1) {
      pill.style.cssText += '; clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 50%, calc(100% - 8px) 100%, 0 100%);';
      pill.style.marginRight = '-4px';
    }
    if (i > 0) {
      pill.style.cssText += '; padding-left: 16px;';
    }
    stageRow.appendChild(pill);
  });
  root.appendChild(stageRow);

  // 2-col layout: left (asset + photos), right (appraiser + valuation)

  // LEFT — Asset + photos
  const leftCol = h('div');

  // Asset details card

  if (a.asset.shmHolder) fields.push(['Pemilik', a.asset.shmHolder]);

      h('button', { class: 'btn ghost sm', onclick: () => { state.selectedApp = a.appNo; navigate('detail'); } }, 'Open LOS application →')));
    root.appendChild(losLink);
  }

  return root;
}

function analyticsKpi(label, value, delta, sub, mode) {
  const isGood = mode === 'pos';
  const deltaClass = delta.startsWith('+') ? (isGood ? 'pos' : 'neg-warn') : (isGood ? 'pos' : 'neg');
  return h('div', { class: 'analytics-kpi' },

function buildTatHistogram() {
  // Distribution: count of apps that closed in 0-1d, 1-2d, 2-3d, 3-4d, 4-5d, 5-7d, 7+d
  const buckets = [
    { label: '0-1d', count: 142, color: '#10b981' },
    { label: '1-2d', count: 98,  color: '#10b981' },
    { label: '2-3d', count: 56,  color: '#10b981' },
    { label: '3-4d', count: 28,  color: '#fbbf24' },
    { label: '4-5d', count: 14,  color: '#fbbf24' },
    { label: '5-7d', count: 7,   color: '#f97316' },
    { label: '7+d',  count: 2,   color: '#dc2626' },
  ];
  const max = Math.max(...buckets.map(b => b.count));
  const svg = svgEl('<svg viewBox="0 0 460 220" xmlns="http://www.w3.org/2000/svg"></svg>');
  const inner = svg.querySelector('svg');
  const W = 460, H = 220, padL = 36, padR = 12, padT = 12, padB = 38;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const barW = plotW / buckets.length * 0.7;
  const gap = (plotW / buckets.length) * 0.3;
  // Y axis ticks
  for (let i = 0; i <= 4; i++) {
    const y = padT + plotH - (plotH * i / 4);
    const v = Math.round(max * i / 4);
    inner.insertAdjacentHTML('beforeend', `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#e2e8f0" stroke-width="0.5"/>`);
    inner.insertAdjacentHTML('beforeend', `<text x="${padL-6}" y="${y+3}" text-anchor="end" font-size="9" fill="#94a3b8">${v}</text>`);
  }
  buckets.forEach((b, i) => {
    const x = padL + i * (plotW / buckets.length) + gap/2;
    const bh = (b.count / max) * plotH;
    const y = padT + plotH - bh;
    inner.insertAdjacentHTML('beforeend', `<rect x="${x}" y="${y}" width="${barW}" height="${bh}" fill="${b.color}" rx="2"/>`);
    inner.insertAdjacentHTML('beforeend', `<text x="${x + barW/2}" y="${y - 4}" text-anchor="middle" font-size="10" fill="#0b1e4b" font-weight="600">${b.count}</text>`);
    inner.insertAdjacentHTML('beforeend', `<text x="${x + barW/2}" y="${H - padB + 14}" text-anchor="middle" font-size="10" fill="#475569">${b.label}</text>`);
  });
  inner.insertAdjacentHTML('beforeend', `<text x="${W/2}" y="${H - 4}" text-anchor="middle" font-size="9" fill="#94a3b8">Time from submission to decision</text>`);
  return svg;
}

        a.at + '  ' + a.action.padEnd(10) + '  ' + a.outcome.padEnd(8) + '  ' + a.docId + (a.denialReason ? '  (' + a.denialReason + ')' : '')));
    });
    docsCard.appendChild(auditBlurb);
  }
  root.appendChild(docsCard);

  return root;
}

function renderDocTile(doc, collateral) {
  const role = state.currentUser.role;
  const canSee = canUserSeeDoc(role, doc.type);

  if (!canSee) {
    const tile = h('div', { class: 'doc-tile locked',
      onclick: () => toast('Your role does not have access to ' + doc.type + ' documents', 'warn') });
    tile.appendChild(h('span', { class: 'doc-lock-overlay' }, '🔒 restricted'));
    const chips = h('div', { class: 'chips-row' });
    chips.appendChild(h('span', { class: 'type-chip' }, doc.type.replace(/_/g, ' ')));
    chips.appendChild(h('span', { class: 'cls-chip cls-' + doc.classification }, doc.classification));
    tile.appendChild(chips);
    tile.appendChild(h('div', { class: 'doc-name', style: 'filter: blur(3px); color: var(--ink-500);' }, 'Document access restricted'));
    tile.appendChild(h('div', { class: 'doc-meta-row' }, h('span', {}, 'Role: ' + role.replace('role-', ''))));
    return tile;
  }

  const tile = h('div', { class: 'doc-tile',
    onclick: () => previewDocument(doc, collateral) });
  const chips = h('div', { class: 'chips-row' });
  chips.appendChild(h('span', { class: 'type-chip' }, doc.type.replace(/_/g, ' ')));
  chips.appendChild(h('span', { class: 'cls-chip cls-' + doc.classification }, doc.classification));
  tile.appendChild(chips);
  tile.appendChild(h('div', { class: 'doc-name' }, doc.fileName));
  const meta = h('div', { class: 'doc-meta-row' });
  meta.appendChild(h('span', {}, fmtFileSize(doc.size)));
  meta.appendChild(h('span', {}, '·'));
  meta.appendChild(h('span', {}, doc.uploadedAt));
  tile.appendChild(meta);
  tile.appendChild(h('div', { class: 'doc-meta-row', style: 'margin-top: 2px;' },
    h('span', {}, 'by ' + doc.uploadedBy)));
  return tile;
}

function fmtFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

/* =========================================================
   DOCUMENT PREVIEW — with permission check, MFA step-up, audit
========================================================= */
function previewDocument(doc, collateral) {
  const decision = accessDecision(state.currentUser.role, doc.type, doc.classification, 'preview');

  if (decision.kind === 'DENY') {
    logAudit({ collateralId: collateral.id, docId: doc.id, action: 'PREVIEW', outcome: 'DENIED',
      denialReason: decision.reason, mfaRequired: false, mfaPassed: false });
    toast('Access denied: ' + decision.reason, 'err');
    return;
  }

  if (decision.kind === 'ALLOW' || decision.kind === 'ALLOW_WITH_AUDIT') {
    logAudit({ collateralId: collateral.id, docId: doc.id, action: 'PREVIEW', outcome: 'GRANTED',
      mfaRequired: false, mfaPassed: false });
    openDocViewer(doc, collateral);
    return;
  }

  // REQUIRE_MFA or REQUIRE_MFA_AND_REASON — check MFA freshness
  const mfaAt = state.currentUser.mfaLastPassedAt;
  const mfaFresh = mfaAt && (Date.now() - new Date(mfaAt).getTime()) < 5 * 60 * 1000;

  if (decision.kind === 'REQUIRE_MFA') {
    if (mfaFresh) {
      logAudit({ collateralId: collateral.id, docId: doc.id, action: 'PREVIEW', outcome: 'GRANTED',
        mfaRequired: true, mfaPassed: true });
      openDocViewer(doc, collateral);
    } else {
      openMfaModal(doc, collateral, () => {
        logAudit({ collateralId: collateral.id, docId: doc.id, action: 'PREVIEW', outcome: 'GRANTED',
          mfaRequired: true, mfaPassed: true });
        openDocViewer(doc, collateral);
      });
    }
    return;
  }

  if (decision.kind === 'REQUIRE_MFA_AND_REASON') {
    // Collect reason first, then MFA
    openReasonAndMfa(doc, collateral, (reason) => {
      logAudit({ collateralId: collateral.id, docId: doc.id, action: 'PREVIEW', outcome: 'GRANTED',
        mfaRequired: true, mfaPassed: true, accessReason: reason });
      openDocViewer(doc, collateral, reason);
    });
  }
}

function openMfaModal(doc, collateral, onSuccess) {
  const body = h('div', { style: 'text-align: center; padding: 8px 0;' });
  body.appendChild(h('div', { class: 'mfa-icon' },
    createSvgHtml('<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>')));
  body.appendChild(h('div', { style: 'font-size: 14px; color: var(--navy-900); font-weight: 500; margin-bottom: 4px;' }, 'Step-up authentication required'));
  body.appendChild(h('div', { style: 'font-size: 12.5px; color: var(--ink-500); line-height: 1.5;' },
    'Document "', h('strong', { style: 'color: var(--navy-900);' }, doc.fileName),
    '" is classified as ',
    h('strong', { style: 'color: var(--navy-900);' }, doc.classification),
    '. Enter the 6-digit code from your authenticator app.'));

  const codeWrap = h('div', { class: 'mfa-code' });
  const inputs = [];
  for (let i = 0; i < 6; i++) {
    const inp = h('input', { type: 'text', maxlength: '1', inputmode: 'numeric' });
    inp.addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '');
      if (e.target.value && i < 5) inputs[i + 1].focus();
      // Auto-submit when all filled
      if (inputs.every(x => x.value)) {
        // Demo: any 6 digits are accepted
        setTimeout(() => {
          state.currentUser.mfaLastPassedAt = new Date().toISOString();
          closeModal();
          toast('MFA verified · access granted for 5 minutes', 'ok');
          onSuccess();
        }, 300);
      }
    });
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && i > 0) inputs[i - 1].focus();
    });
    inputs.push(inp);
    codeWrap.appendChild(inp);
  }
  body.appendChild(codeWrap);
  body.appendChild(h('div', { class: 'mfa-hint' }, 'Demo tip: enter any 6 digits'));

  openModal('Verify identity', body, [
    { label: 'Cancel', kind: 'ghost',
      onclick: () => {
        logAudit({ collateralId: collateral.id, docId: doc.id, action: 'PREVIEW', outcome: 'DENIED',
          denialReason: 'User cancelled MFA challenge', mfaRequired: true, mfaPassed: false });
      }},
  ]);
  setTimeout(() => inputs[0]?.focus(), 50);
}

function openReasonAndMfa(doc, collateral, onSuccess) {
  const body = h('div');
  body.appendChild(h('div', { style: 'background: #fef2f2; border-left: 3px solid var(--err); padding: 10px 14px; font-size: 12px; color: #7f1d1d; border-radius: 4px; margin-bottom: 14px;' },
    h('strong', {}, 'RESTRICTED document. '),
    'A written reason and step-up MFA are both required. Your reason will be permanently logged to the OJK audit trail.'));
  body.appendChild(h('label', { style: 'font-size: 11.5px; font-weight: 500; color: var(--ink-700); text-transform: uppercase; letter-spacing: 0.08em;' }, 'Reason for access'));
  const textarea = h('textarea', {
    placeholder: 'e.g., Underwriting review per application APP-2026-000412 · Credit Committee meeting 25 April',
    style: 'width: 100%; min-height: 82px; padding: 10px 12px; border: 1px solid var(--ink-300); border-radius: 6px; font-family: inherit; font-size: 13px; resize: vertical; margin-top: 6px;',
  });
  body.appendChild(textarea);

  openModal('Restricted document access', body, [
    { label: 'Cancel', kind: 'ghost',
      onclick: () => {
        logAudit({ collateralId: collateral.id, docId: doc.id, action: 'PREVIEW', outcome: 'DENIED',
          denialReason: 'User cancelled at reason prompt', mfaRequired: true, mfaPassed: false });
      }},
    { label: 'Continue to MFA', kind: 'primary',
      onclick: () => {
        const reason = textarea.value.trim();
        if (reason.length < 20) {
          toast('Please provide a reason of at least 20 characters (audit requirement)', 'warn');
          return false;  // keep modal open
        }
        closeModal();
        // now MFA
        const mfaAt = state.currentUser.mfaLastPassedAt;
        const mfaFresh = mfaAt && (Date.now() - new Date(mfaAt).getTime()) < 5 * 60 * 1000;
        if (mfaFresh) {
          onSuccess(reason);
        } else {
          openMfaModal(doc, collateral, () => onSuccess(reason));
        }
      }},
  ]);
  setTimeout(() => textarea.focus(), 50);
}

function openDocViewer(doc, collateral, reason) {
  const backdrop = document.getElementById('docview-backdrop');

    onclick: () => { backdrop.classList.remove('open'); } });

  // Body with doc + watermark
  const body = h('div', { class: 'docview-body' });

  body.appendChild(img);
  if (doc.classification !== 'PUBLIC') {

      doc.classification + ' · ' + state.currentUser.displayName + ' · ' + new Date().toISOString().slice(0, 16));
    body.appendChild(wm);
  }
  viewer.appendChild(body);

  // Foot
  const foot = h('div', { class: 'docview-foot' });
  const auditText = 'Logged · ' + new Date().toISOString().slice(0, 19) + ' · viewer ' + state.currentUser.username + ' · role ' + state.currentUser.role.replace('role-', '') + (reason ? ' · reason: "' + reason.slice(0, 40) + (reason.length > 40 ? '…' : '') + '"' : '');

    onclick: () => { backdrop.classList.remove('open'); } }, 'Close'));
  foot.appendChild(actions);
  viewer.appendChild(foot);

  backdrop.classList.add('open');
}

function attemptDownload(doc, collateral) {
  const decision = accessDecision(state.currentUser.role, doc.type, doc.classification, 'download');
  if (decision.kind === 'DENY') {
    logAudit({ collateralId: collateral.id, docId: doc.id, action: 'DOWNLOAD', outcome: 'DENIED',
      denialReason: decision.reason, mfaRequired: false, mfaPassed: false });
    toast('Download denied: ' + decision.reason, 'err');
    return;
  }
  // In production would stream with watermark. Here, just log + toast.
  logAudit({ collateralId: collateral.id, docId: doc.id, action: 'DOWNLOAD', outcome: 'GRANTED',
    mfaRequired: false, mfaPassed: false });
  toast('Download started — watermarked with your username + timestamp', 'ok');
}

function logAudit(entry) {
  entry.at = new Date().toISOString().slice(0, 19).replace('T', ' ');
  entry.username = state.currentUser.username;
  entry.role = state.currentUser.role;
  state.docAuditLog.unshift(entry);
}

/* =========================================================
   COLLATERAL REGISTRATION WIZARD
========================================================= */
const WIZARD_STEPS = [
  { num: 1, name: 'Basic info' },
  { num: 2, name: 'Certificate' },
  { num: 3, name: 'Valuation' },
  { num: 4, name: 'Documents' },
  { num: 5, name: 'Review' },
];

function openCollateralWizard(existingCollateral, startStep) {
  const wiz = {
    step: startStep === 'upload' ? 4 : 1,
    data: existingCollateral ? {
      category: existingCollateral.category, desc: existingCollateral.desc,
      owner: existingCollateral.owner, cert: existingCollateral.cert, certNo: existingCollateral.certNo,
      declared: existingCollateral.declared, market: existingCollateral.market,
      haircut: existingCollateral.haircut, appraised: existingCollateral.appraised,
      docs: [...(existingCollateral.docs || [])],
      existing: true, id: existingCollateral.id,
    } : {
      category: 'PROPERTY', desc: '', owner: '',
      cert: 'SHM', certNo: '',
      declared: 0, market: 0, haircut: 0.70, appraised: 0,
      docs: [],
      existing: false,
    },
  };
  renderWizard(wiz);
}

function renderWizard(wiz) {
  const body = h('div');

  // Steps header
  const steps = h('div', { class: 'wiz-steps' });
  WIZARD_STEPS.forEach(s => {
    const st = h('div', { class: 'wiz-step' + (s.num === wiz.step ? ' active' : s.num < wiz.step ? ' done' : '') });
    st.appendChild(h('span', { class: 'num' }, s.num < wiz.step ? '✓' : String(s.num)));
    st.appendChild(h('span', { class: 'name' }, s.name));
    steps.appendChild(st);
  });
  body.appendChild(steps);

  // Step content
  const content = h('div', { class: 'wiz-content' });
  if (wiz.step === 1) content.appendChild(wizardStep1(wiz));
  else if (wiz.step === 2) content.appendChild(wizardStep2(wiz));
  else if (wiz.step === 3) content.appendChild(wizardStep3(wiz));
  else if (wiz.step === 4) content.appendChild(wizardStep4(wiz));
  else if (wiz.step === 5) content.appendChild(wizardStep5(wiz));
  body.appendChild(content);

  // Nav
  const nav = h('div', { class: 'wiz-nav' });
  if (wiz.step > 1) {
    nav.appendChild(h('button', { class: 'btn ghost sm',
      onclick: () => { wiz.step--; closeModal(); setTimeout(() => renderWizard(wiz), 10); } }, '← Back'));
  } else {
    nav.appendChild(h('span'));
  }
  const rightBtns = h('div', { style: 'display: flex; gap: 8px;' });
  rightBtns.appendChild(h('button', { class: 'btn ghost sm',
    onclick: () => { closeModal(); toast('Registration cancelled', 'info'); } }, 'Cancel'));
  if (wiz.step < 5) {
    rightBtns.appendChild(h('button', { class: 'btn sm',
      onclick: () => { if (validateWizardStep(wiz)) { wiz.step++; closeModal(); setTimeout(() => renderWizard(wiz), 10); } } }, 'Next →'));
  } else {
    rightBtns.appendChild(h('button', { class: 'btn sm',
      onclick: () => submitWizard(wiz) }, wiz.data.existing ? 'Save changes' : 'Register collateral'));
  }
  nav.appendChild(rightBtns);
  body.appendChild(nav);

  openModal((wiz.data.existing ? 'Edit collateral · ' : 'Register new collateral · ') + 'Step ' + wiz.step + ' of 5',
    body, []);
  // Make modal wider for wizard
  setTimeout(() => {
    const m = document.querySelector('#modal'); if (m) m.style.maxWidth = '640px';
  }, 10);
}

  recomputeApprWiz(wiz);

  const preview = h('div', { id: 'wiz-appr-preview',
    style: 'background: var(--ink-50); border: 1px solid var(--ink-200); border-radius: 8px; padding: 14px 18px; margin-top: 4px;' });
  renderApprPreview(preview, wiz);
  root.appendChild(preview);

  return root;
}

function recomputeApprWiz(wiz) {
  wiz.data.appraised = Math.round(wiz.data.market * wiz.data.haircut);
}

function renderApprPreview(el, wiz) {
  el.innerHTML = '';
  el.appendChild(h('div', { style: 'font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-500); font-weight: 500; margin-bottom: 8px;' }, 'Computed appraised value'));
  el.appendChild(h('div', { style: 'display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; font-size: 12.5px;' },
    h('span', {}, 'Market value'),
    h('span', { style: 'font-family: ui-monospace, Menlo, monospace;' }, fmtIDR(wiz.data.market))));
  el.appendChild(h('div', { style: 'display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; font-size: 12.5px;' },
    h('span', {}, 'Hair-cut (' + wiz.data.category + ')'),
    h('span', { style: 'font-family: ui-monospace, Menlo, monospace;' }, '× ' + Math.round(wiz.data.haircut * 100) + '%')));
  el.appendChild(h('hr', { style: 'border: 0; border-top: 1px solid var(--ink-200); margin: 8px 0;' }));
  el.appendChild(h('div', { style: 'display: flex; justify-content: space-between; align-items: baseline; font-size: 14px; font-weight: 600; color: var(--navy-900);' },
    h('span', {}, 'Appraised value'),
    h('span', { style: 'font-family: ui-monospace, Menlo, monospace; color: var(--ok);' }, fmtIDR(wiz.data.appraised))));
}

function updateApprPreview(wiz) {
  const el = document.getElementById('wiz-appr-preview');
  if (el) renderApprPreview(el, wiz);
}

function wizardStep4(wiz) {
  const root = h('div');
  root.appendChild(h('p', { style: 'font-size: 13px; color: var(--ink-500); margin-bottom: 18px;' },
    'Upload supporting documents. ',
    h('strong', {}, 'Classification is enforced: '),
    'CERTIFICATE and VALUATION are always CONFIDENTIAL; LEGAL_OPINION is RESTRICTED (MFA + written reason required for access).'));

  // Required vs optional docs by category
  const reqDocs = requiredDocTypesFor(wiz.data.category, wiz.data.cert);
  const grid = h('div', { class: 'doc-grid' });

  reqDocs.forEach(slot => {
    const uploaded = wiz.data.docs.find(d => d.type === slot.type);
    if (uploaded) {
      const tile = h('div', { class: 'doc-tile' });
      tile.appendChild(h('span', { class: 'type-chip' }, slot.type.replace(/_/g, ' ')));
      tile.appendChild(h('span', { class: 'cls-chip cls-' + slot.classification }, slot.classification));
      tile.appendChild(h('div', { class: 'doc-name' }, uploaded.fileName));
      tile.appendChild(h('div', { class: 'doc-meta-row' },
        h('span', { style: 'color: var(--ok);' }, '✓ uploaded'),
        h('span', {}, ' · '),
        h('span', {}, fmtFileSize(uploaded.size))));
      tile.appendChild(h('button', { class: 'btn ghost sm',
        style: 'margin-top: 8px; padding: 3px 10px; font-size: 11px;',
        onclick: (e) => {
          e.stopPropagation();
          wiz.data.docs = wiz.data.docs.filter(d => d.type !== slot.type);
          closeModal(); setTimeout(() => renderWizard(wiz), 10);
        } }, '× Remove'));
      grid.appendChild(tile);
    } else {
      const tile = h('div', { class: 'upload-btn',
        onclick: () => mockUploadDoc(wiz, slot) });
      tile.appendChild(h('div', { style: 'font-size: 22px;' }, '⬆'));
      tile.appendChild(h('div', {}, slot.type.replace(/_/g, ' ')));
      tile.appendChild(h('div', { style: 'font-size: 10px; color: var(--ink-500);' },
        slot.required ? 'Required · ' : 'Optional · ', slot.classification));
      grid.appendChild(tile);
    }
  });
  root.appendChild(grid);

  // Legal note
  root.appendChild(h('div', { style: 'background: #fffbea; border: 1px solid #f0d97a; border-left: 3px solid var(--gold-500); border-radius: 8px; padding: 12px 16px; margin-top: 16px; font-size: 12px; color: #854f0b; line-height: 1.55;' },
    h('strong', {}, 'Access control: '),
    'documents classified CONFIDENTIAL can be previewed by authorized roles but downloading requires fresh MFA. RESTRICTED documents (like LEGAL_OPINION) require MFA AND a written reason — both logged to the OJK audit trail.'));

  return root;
}

function requiredDocTypesFor(category, cert) {
  const base = [];
  if (category === 'PROPERTY') {
    base.push({ type: 'CERTIFICATE',      classification: 'CONFIDENTIAL', required: true });
    base.push({ type: 'VALUATION_REPORT', classification: 'CONFIDENTIAL', required: true });
    base.push({ type: 'SITE_PHOTOS',      classification: 'INTERNAL',     required: true });
    base.push({ type: 'BPN_CHECK_REPORT', classification: 'CONFIDENTIAL', required: true });
    base.push({ type: 'PBB',              classification: 'INTERNAL',     required: false });
    base.push({ type: 'IJIN_MENDIRIKAN_BANGUNAN', classification: 'INTERNAL', required: false });
    base.push({ type: 'LEGAL_OPINION',    classification: 'RESTRICTED',   required: false });
  } else if (category === 'VEHICLE') {
    base.push({ type: 'CERTIFICATE',      classification: 'CONFIDENTIAL', required: true });
    base.push({ type: 'VALUATION_REPORT', classification: 'CONFIDENTIAL', required: true });
    base.push({ type: 'SITE_PHOTOS',      classification: 'INTERNAL',     required: true });
    base.push({ type: 'INSURANCE_POLICY', classification: 'INTERNAL',     required: true });
  } else if (category === 'MACHINERY' || category === 'INVENTORY') {
    base.push({ type: 'VALUATION_REPORT', classification: 'CONFIDENTIAL', required: true });
    base.push({ type: 'SITE_PHOTOS',      classification: 'INTERNAL',     required: true });
    base.push({ type: 'INSURANCE_POLICY', classification: 'INTERNAL',     required: true });
    base.push({ type: 'FIDUSIA',          classification: 'CONFIDENTIAL', required: false });
  } else if (category === 'DEPOSITO') {
    base.push({ type: 'CERTIFICATE',      classification: 'CONFIDENTIAL', required: true });
  } else if (category === 'GUARANTEE') {
    base.push({ type: 'NOTARY_DEED',      classification: 'CONFIDENTIAL', required: true });
    base.push({ type: 'OWNER_ID',         classification: 'RESTRICTED',   required: true });
  }
  return base;
}

function mockUploadDoc(wiz, slot) {
  // Pick a reasonable mock asset based on slot type
  const assetMap = {
    CERTIFICATE: wiz.data.cert === 'BPKB' ? 'bpkb_a9876543' : 'shm_1234567',
    VALUATION_REPORT: 'valuation_report',
    SITE_PHOTOS: 'site_photo',
    LEGAL_OPINION: 'legal_opinion',
    BPN_CHECK_REPORT: 'legal_opinion',
    INSURANCE_POLICY: 'legal_opinion',
  };
  const assetKey = assetMap[slot.type] || 'legal_opinion';
  const mockFile = {
    type: slot.type,
    classification: slot.classification,
    fileName: slot.type.toLowerCase().replace(/_/g, '-') + '-' + Date.now() + '.pdf',
    mime: 'application/pdf',
    size: 100_000 + Math.round(Math.random() * 500_000),
    assetKey: assetKey,
    uploadedAt: new Date().toISOString().slice(0, 16).replace('T', ' '),
    uploadedBy: state.currentUser.displayName,
  };
  wiz.data.docs.push(mockFile);
  toast('Uploaded · integrity hash computed · stored encrypted at rest', 'ok');
  closeModal(); setTimeout(() => renderWizard(wiz), 10);
}

function wizardStep5(wiz) {
  const root = h('div');
  root.appendChild(h('p', { style: 'font-size: 13px; color: var(--ink-500); margin-bottom: 18px;' },
    'Review everything before submission. All data will be versioned in CAMS and an audit trail entry will be created.'));

  const review = h('div', { style: 'background: var(--ink-50); border: 1px solid var(--ink-200); border-radius: 8px; padding: 16px 20px;' });

  const rows = [
    ['Category', wiz.data.category],
    ['Description', wiz.data.desc || '—'],
    ['Owner', wiz.data.owner || '—'],
    ['Certificate', wiz.data.cert + (wiz.data.certNo ? ' · ' + wiz.data.certNo : '')],
    ['Declared value', fmtIDR(wiz.data.declared)],
    ['Market value', fmtIDR(wiz.data.market)],
    ['Hair cut', Math.round(wiz.data.haircut * 100) + '%'],
    ['Appraised value', fmtIDR(wiz.data.appraised)],
    ['Documents attached', wiz.data.docs.length + ' files'],
  ];
  rows.forEach(([l, v]) => {
    review.appendChild(h('div', { style: 'display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed var(--ink-200); font-size: 13px;' },
      h('span', { style: 'color: var(--ink-500);' }, l),
      h('span', { style: 'color: var(--navy-900); font-weight: 500;' }, v)));
  });
  root.appendChild(review);

  // Next steps note
  root.appendChild(h('div', { style: 'margin-top: 16px; padding: 14px 18px; background: #eff6ff; border-left: 3px solid var(--navy-700); border-radius: 4px; font-size: 12px; color: var(--navy-900); line-height: 1.55;' },
    h('strong', {}, 'On submission: '),
    'CAMS CMMN case starts. Plan items activated based on category — BPN check (if SHM/SHGB), BPKB check (if vehicle), KJPP valuation request (if market > Rp 500M). CAMS Officer is notified; SLA clock starts.'));

  return root;
}

function validateWizardStep(wiz) {
  if (wiz.step === 1) {
    if (!wiz.data.desc || wiz.data.desc.trim().length < 5) { toast('Description must be at least 5 characters', 'warn'); return false; }
    if (!wiz.data.owner || wiz.data.owner.trim().length < 3) { toast('Owner name is required', 'warn'); return false; }
  }
  if (wiz.step === 2 && wiz.data.cert !== 'NONE') {
    if (!wiz.data.certNo || wiz.data.certNo.trim().length < 3) { toast('Certificate number is required', 'warn'); return false; }
  }
  if (wiz.step === 3) {
    if (!wiz.data.market || wiz.data.market < 1_000_000) { toast('Market value must be at least Rp 1.000.000', 'warn'); return false; }
  }
  if (wiz.step === 4) {
    const required = requiredDocTypesFor(wiz.data.category, wiz.data.cert).filter(s => s.required);
    const missing = required.filter(r => !wiz.data.docs.find(d => d.type === r.type));
    if (missing.length > 0) {
      toast('Missing required: ' + missing.map(m => m.type.replace(/_/g, ' ')).join(', '), 'warn');
      return false;
    }
  }
  return true;
}

function submitWizard(wiz) {
  // Generate ID, push to state, seed docs
  const id = wiz.data.existing ? wiz.data.id
    : 'COL-' + new Date().getFullYear() + '-' + String(Date.now()).slice(-6);
  const appraised = wiz.data.appraised || Math.round(wiz.data.market * wiz.data.haircut);

  // Persist docs into state.documents and update doc IDs on collateral
  const docIds = [];
  wiz.data.docs.forEach((d, i) => {
    const docId = 'D-' + d.type.slice(0, 4) + '-' + id.slice(-3) + '-' + i;
    state.documents[docId] = {
      id: docId,
      collateralId: id,
      type: d.type,
      classification: d.classification,
      fileName: d.fileName,
      mime: d.mime,
      size: d.size,
      assetKey: d.assetKey,
      uploadedAt: d.uploadedAt,
      uploadedBy: d.uploadedBy,
    };
    docIds.push(docId);
  });

  if (wiz.data.existing) {
    // Update existing
    const c = state.collaterals.find(x => x.id === id);
    if (c) {
      c.category = wiz.data.category;
      c.desc = wiz.data.desc;
      c.owner = wiz.data.owner;
      c.cert = wiz.data.cert;
      c.certNo = wiz.data.certNo;
      c.declared = wiz.data.declared;
      c.market = wiz.data.market;
      c.haircut = wiz.data.haircut;
      c.appraised = appraised;
      c.docs = [...(c.docs || []), ...docIds];
    }
  } else {
    state.collaterals.unshift({
      id: id,
      category: wiz.data.category,
      desc: wiz.data.desc,
      cert: wiz.data.cert,
      certNo: wiz.data.certNo || null,
      owner: wiz.data.owner,
      declared: wiz.data.declared,
      market: wiz.data.market,
      appraised: appraised,
      haircut: wiz.data.haircut,
      ltv: 0,
      status: 'FREE',
      nextVal: new Date(Date.now() + 2 * 365 * 86400000).toISOString().slice(0, 10),
      docs: docIds,
    });
  }

  closeModal();
  toast('Collateral ' + id + ' registered · CAMS case started · ' + docIds.length + ' documents stored', 'ok');
  state.selectedCollateral = state.collaterals.find(c => c.id === id);
  state.route = 'collateral';
  render();
}

function wizField(label, help) {
  const el = h('div', { style: 'margin-bottom: 4px;' });
  el.appendChild(h('div', { style: 'font-size: 11px; font-weight: 500; color: var(--ink-700); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;' }, label));
  if (help) el.appendChild(h('div', { style: 'font-size: 11px; color: var(--ink-500); margin-bottom: 6px;' }, help));
  return el;
}

/* =========================================================
   BOOT
========================================================= */
state.documents = seedDocuments();
render();
</script>
